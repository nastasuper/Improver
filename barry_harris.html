let audioCtx = null;
let currentStop = null; 

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

const NOTE_SEMITONE = {
  'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'Fb':4,'F':5,'F#':6,
  'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11,'Cb':11
};

function noteFreq(noteName, octave) {
  const semi = NOTE_SEMITONE[noteName];
  if (semi === undefined) return null;
  
  const midi = (octave + 1) * 12 + semi;
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function simulateFreqs(notes, direction, startOctave) {
  const result = [];
  let oct = startOctave;
  let prevSemi = NOTE_SEMITONE[notes[0]];
  if (prevSemi === undefined) return [];
  result.push(noteFreq(notes[0], oct));
  for (let i = 1; i < notes.length; i++) {
    const s = NOTE_SEMITONE[notes[i]];
    if (s === undefined) continue;
    if (direction === 'up') { if (s <= prevSemi) oct++; }
    else                    { if (s >= prevSemi) oct--; }
    result.push(noteFreq(notes[i], oct));
    prevSemi = s;
  }
  return result;
}

function getStartOctave(notes, direction) {
  if (!notes.length) return 4;
  if (NOTE_SEMITONE[notes[0]] === undefined) return 4;
  const TARGET = 293; 
  let bestOct = 4;
  let bestDiff = Infinity;
  for (let oct = 2; oct <= 6; oct++) {
    const freqs = simulateFreqs(notes, direction, oct).filter(Boolean);
    if (!freqs.length) continue;
    const sorted = [...freqs].sort((a, b) => a - b);
    const median = sorted[Math.floor(sorted.length / 2)];
    const diff = Math.abs(median - TARGET);
    if (diff < bestDiff) { bestDiff = diff; bestOct = oct; }
  }
  return bestOct;
}

function resolveFreqs(notes, direction, startOctave) {
  if (!notes.length) return [];
  const freqs = [];
  let oct = startOctave;
  let prevSemi = NOTE_SEMITONE[notes[0]];
  freqs.push(noteFreq(notes[0], oct));

  for (let i = 1; i < notes.length; i++) {
    const semi = NOTE_SEMITONE[notes[i]];
    if (semi === undefined) { freqs.push(null); continue; }

    if (direction === 'up') {
      if (semi <= prevSemi) oct++;
    } else {
      
      
      const stepUp = ((semi - prevSemi) + 12) % 12;
      if (stepUp === 1) {
        
      } else if (semi >= prevSemi) {
        oct--;
      }
    }
    freqs.push(noteFreq(notes[i], oct));
    prevSemi = semi;
  }
  return freqs;
}

let activeOscillators = [];

function playTone(ctx, freq, startTime, duration) {
  
  
  const harmonics = [
    { ratio: 1,    gain: 0.6,  detune: 0    },
    { ratio: 2,    gain: 0.25, detune: 1.2  },
    { ratio: 3,    gain: 0.12, detune: -0.8 },
    { ratio: 4,    gain: 0.07, detune: 1.5  },
    { ratio: 5,    gain: 0.04, detune: -1.0 },
    { ratio: 6,    gain: 0.02, detune: 0.5  },
  ];

  
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = Math.min(freq * 12, 8000);
  filter.Q.value = 0.5;
  filter.connect(ctx.destination);

  
  const decayTime = Math.min(duration + 1.5, 4.0) * (1 + (300 / Math.max(freq, 100)));
  const normDecay = Math.min(decayTime, 5.0);

  harmonics.forEach(h => {
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    osc.connect(env);
    env.connect(filter);

    osc.type = 'sine';
    osc.frequency.value = freq * h.ratio;
    osc.detune.value = h.detune;

    
    const attack = 0.004;
    const peakGain = h.gain * 0.35;
    const sustainLevel = peakGain * 0.05;

    env.gain.setValueAtTime(0, startTime);
    env.gain.linearRampToValueAtTime(peakGain, startTime + attack);
    env.gain.exponentialRampToValueAtTime(
      Math.max(sustainLevel, 0.0001),
      startTime + attack + normDecay * (1 / h.ratio) 
    );
    env.gain.exponentialRampToValueAtTime(0.0001, startTime + duration + 0.3);

    osc.start(startTime);
    osc.stop(startTime + duration + 0.4);

    activeOscillators.push({ osc, env });
    osc.onended = () => {
      activeOscillators = activeOscillators.filter(o => o.osc !== osc);
    };
  });
}

function killAllOscillators() {
  const now = audioCtx ? audioCtx.currentTime : 0;
  activeOscillators.forEach(({ osc, env }) => {
    try {
      env.gain.cancelScheduledValues(now);
      env.gain.setValueAtTime(0, now);
      osc.stop(now);
    } catch(e) {}
  });
  activeOscillators = [];
  // Si hay un contexto activo, cerrarlo para matar osciladores futuros
  if (audioCtx) {
    try { audioCtx.close(); } catch(e) {}
    audioCtx = null;
  }
}

function getBpm() {
  return parseInt(document.getElementById('bpm-slider').value, 10);
}

function isSwing() {
  return document.getElementById('swing-chk').checked;
}

function getNoteTimings(noteCount, startTime, fillBar) {
  const bpm = getBpm();
  const swing = isSwing();
  const eighthStraight = 60 / (bpm * 2);
  const swingLong  = (60 / bpm) * (2/3);
  const swingShort = (60 / bpm) * (1/3);
  const beatDuration = 60 / bpm;
  const barDuration = beatDuration * 4; 

  const timings = [];
  let t = startTime;
  for (let i = 0; i < noteCount; i++) {
    const isLast = i === noteCount - 1;
    const isOddCount = noteCount % 2 === 1;
    let dur;
    if (isLast && fillBar) {
      
      const barEnd = startTime + barDuration;
      dur = Math.max(barEnd - t, swingLong);
    } else if (isLast && isOddCount) {
      dur = swing ? swingLong + swingShort : eighthStraight * 2;
    } else if (!swing) {
      dur = eighthStraight;
    } else {
      dur = (i % 2 === 0) ? swingLong : swingShort;
    }
    timings.push({ startTime: t, duration: dur });
    t += dur;
  }
  return timings;
}

function highlightBarNum(seqIdx) {
  document.querySelectorAll('.bar-num').forEach(n => n.classList.remove('active-bar'));
  document.querySelectorAll('.bar-row').forEach(r => r.classList.remove('active-bar-row'));
  const row = document.querySelector(`.bar-row[data-seq="${seqIdx}"]`);
  if (row) {
    const num = row.querySelector('.bar-num');
    if (num) num.classList.add('active-bar');
    row.classList.add('active-bar-row');
    _emitPlayEvent({ type: 'barChange', seqIdx });
  }
}

// ── PLAY EVENTS (capa liviana de suscripción) ─────────────────────────────────
// El motor no llama visualizaciones directamente.
// Las capas visuales se suscriben con onPlayEvent().
const _playEventListeners = [];

function onPlayEvent(fn) {
  _playEventListeners.push(fn);
  return () => {
    const i = _playEventListeners.indexOf(fn);
    if (i >= 0) _playEventListeners.splice(i, 1);
  };
}

function _emitPlayEvent(event) {
  // Llamada síncrona y mínima — sin lógica extra
  for (let i = 0; i < _playEventListeners.length; i++) {
    _playEventListeners[i](event);
  }
}

function highlightNote(seqIdx, noteIdx, active) {
  // Emitir evento — sin latencia adicional
  _emitPlayEvent({ type: active ? 'noteStart' : 'noteEnd', seqIdx, noteIdx });

  // Lógica visual actual intacta
  document.querySelectorAll(`.note[data-seq="${seqIdx}"][data-ni="${noteIdx}"]`).forEach(el => {
    if (active) el.classList.add('active');
    else el.classList.remove('active');
  });
  if (active && noteIdx === 0) {
    const row = document.querySelector(`.bar-row[data-seq="${seqIdx}"]`);
    if (row) {
      const name = row.querySelector('.bar-chord-name');
      if (name) {
        name.classList.remove('flash');
        void name.offsetWidth;
        name.classList.add('flash');
      }
    // Mostrar solo el número del compás activo + glow en el tile
    document.querySelectorAll('.bar-num').forEach(n => n.classList.remove('active-bar'));
    document.querySelectorAll('.bar-row').forEach(r => r.classList.remove('active-bar-row'));
    const num = row.querySelector('.bar-num');
    if (num) num.classList.add('active-bar');
    row.classList.add('active-bar-row');
    }
    // Emitir barChange para capas que necesiten saber el compás activo
    _emitPlayEvent({ type: 'barChange', seqIdx });
  }
}

function clearAllHighlights() {
  document.querySelectorAll('.note.active').forEach(el => el.classList.remove('active'));
}

function stopAll(keepOutput = false) {
  if (currentStop) { currentStop(); currentStop = null; }

  clearAllHighlights();
  scheduledTimers.forEach(clearTimeout);
  scheduledTimers = [];

}

function playSequence(seqIdx, btn) {
  stopAll();
  const seq = audioSequences[seqIdx];
  if (!seq || !seq.notes.length) return;

  const ctx = getAudioCtx();
  const now = ctx.currentTime + 0.05;
  const timings = getNoteTimings(seq.notes.length, now);
  const dir = seq.direction === 'down' ? 'down' : 'up';
  const startOct = getStartOctave(seq.notes, dir);
  const freqs = resolveFreqs(seq.notes, dir, startOct);

  seq.notes.forEach((note, i) => {
    const freq = freqs[i];
    if (!freq) return;
    const { startTime, duration } = timings[i];
    playTone(ctx, freq, startTime, duration);

    const onDelay = (startTime - ctx.currentTime) * 1000;
    const offDelay = onDelay + duration * 1000;
    const onT = setTimeout(() => highlightNote(seqIdx, i, true), Math.max(0, onDelay));
    const offT = setTimeout(() => highlightNote(seqIdx, i, false), Math.max(0, offDelay));
    scheduledTimers.push(onT, offT);
  });

  if (btn) btn.classList.add('playing');
  const endTime = timings[timings.length - 1].startTime + timings[timings.length - 1].duration;
  const totalDuration = endTime - now;

  
  if (isMetroEnabled()) scheduleMetronome(ctx, [now]);

  const endT = setTimeout(() => {
    clearAllHighlights();
    if (btn) btn.classList.remove('playing');
  }, totalDuration * 1000 + 100);
  scheduledTimers.push(endT);

  currentStop = () => { scheduledTimers.forEach(clearTimeout); scheduledTimers = []; };
}

let scheduledTimers = [];
let playGeneration = 0; // incrementa en cada nuevo ciclo para invalidar timers viejos

function isLoopEnabled() {
  const el = document.getElementById('loop-chk');
  return el ? el.checked : false;
}

function playAll(fromRestart = false) {
  _dbg.reset();
  // iOS: crear y reanudar AudioContext en respuesta a gesto del usuario
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  // Si viene de restart, siempre proceder independientemente del estado
  if (!fromRestart && isPlayingNow && !isPaused) return; // evitar doble reproducción solo si está activo y no pausado
  if (!audioSequences.length) {
    
    document.body.classList.add('is-playing');
    const playingTitle = document.getElementById('playing-title');
    if (playingTitle) {
      const progInput = document.getElementById('input').value.trim();
      const baseName = currentProgName || (progInput.length > 60 ? progInput.substring(0, 60) + '…' : progInput);
      playingTitle.textContent = baseName.toUpperCase().replace(/BB/g, 'Bb').replace(/EB/g, 'Eb').replace(/AB/g, 'Ab').replace(/DB/g, 'Db').replace(/GB/g, 'Gb');
    }
    analyze(true);
    setTimeout(() => playAll(true), 300);
    return;
  }
  if (!fromRestart) {
    stopAll(true);
    isPaused = false;
    pausedAtSec = 0;
  } else {
    // Limpieza explícita sin cambiar is-playing
    isPaused = false;
    pausedAtSec = 0;
    scheduledTimers.forEach(clearTimeout);
    scheduledTimers = [];
    killAllOscillators();
    clearAllHighlights();
    if (currentStop) { currentStop = null; }
    stopProgressBar();
  }
  isPlayingNow = true;
  document.body.classList.add('is-playing');
  document.getElementById('output').style.display = '';
  const ppBtn2 = document.getElementById('btn-play-pause');
  updatePlayBtn(true);

  const playingTitle = document.getElementById('playing-title');
  if (playingTitle) {
    const progInput = document.getElementById('input').value.trim();
    const baseName = currentProgName || (progInput.length > 60 ? progInput.substring(0, 60) + '…' : progInput);
    const ctxNames = { blues: 'Blues', jazzblues: 'Jazz Blues', bluesmenor: 'Blues Menor', rhythmchanges: 'Rhythm Changes', general: 'General' };
    const ctxLabel = ctxNames[currentContext] && currentContext !== 'general' ? ` · ${ctxNames[currentContext]}` : '';
    playingTitle.textContent = (baseName + ctxLabel).toUpperCase().replace(/BB/g, 'Bb').replace(/EB/g, 'Eb').replace(/AB/g, 'Ab').replace(/DB/g, 'Db').replace(/GB/g, 'Gb');
  }

  const btn = document.getElementById('btn-play-all');
  if (btn) { btn.classList.add('playing'); btn.textContent = '■ Tocando...'; }

  const ctx = getAudioCtx();

  const myGeneration = ++playGeneration;
  const playOnce = (startCursor) => {
    if (playGeneration !== myGeneration) return; // ciclo invalidado
    const bpmNow = getBpm();
    const barDurationNow = isSwing()
      ? ((60/bpmNow)*(2/3) + (60/bpmNow)*(1/3)) * 4
      : (60/(bpmNow*2)) * 4;
    const countInDuration = (!startCursor && isMetroEnabled()) ? barDurationNow : 0;
    const playStart = startCursor || (ctx.currentTime + 0.05 + countInDuration);
    let cursor = playStart;
    const barStartTimes = [];

    audioSequences.forEach((seq, seqIdx) => {
      barStartTimes.push(cursor);
      if (!seq.notes.length) {
        const bpm = getBpm();
        const swing = isSwing();
        const barDuration = swing
          ? ((60/bpm)*(2/3) + (60/bpm)*(1/3)) * 4
          : (60/(bpm*2)) * 4;
        // Marcar número de compás aunque no haya notas
        const barDelay = Math.max(0, (cursor - ctx.currentTime) * 1000);
        const barT = setTimeout(() => highlightBarNum(seqIdx), barDelay);
        scheduledTimers.push(barT);
        cursor += barDuration;
        return;
      }
      const timings = getNoteTimings(seq.notes.length, cursor);
      const dir = seq.direction === 'down' ? 'down' : 'up';
      const startOct = getStartOctave(seq.notes, dir);
      const freqs = resolveFreqs(seq.notes, dir, startOct);

      seq.notes.forEach((note, i) => {
        const freq = freqs[i];
        if (!freq) return;
        const { startTime, duration } = timings[i];
        playTone(ctx, freq, startTime, duration);

        const onDelay  = (startTime - ctx.currentTime) * 1000;
        const offDelay = onDelay + duration * 1000;
        const onT  = setTimeout(() => highlightNote(seqIdx, i, true),  Math.max(0, onDelay));
        const offT = setTimeout(() => highlightNote(seqIdx, i, false), Math.max(0, offDelay));
        scheduledTimers.push(onT, offT);
      });

      cursor = timings[timings.length - 1].startTime + timings[timings.length - 1].duration;
    });

    if (isMetroEnabled()) scheduleMetronome(ctx, barStartTimes);

    
    const rows = Array.from(document.querySelectorAll('.bar-row'));
    if (rows.length > 0) {
      // Asegurar que el output es visible
      document.getElementById('output').style.display = '';
      // Mostrar primer grupo inmediatamente
      rows.forEach((r, i) => {
        r.style.display = i < 4 ? '' : 'none';
        r.style.opacity = '1';
      });
      // Programar grupos siguientes
      barStartTimes.forEach((t, i) => {
        if (i > 0 && i % 4 === 0) {
          const delay = Math.max(0, (t - ctx.currentTime) * 1000);
          const grp = i;
          const t1 = setTimeout(() => {
            lastVisibleGroup = grp;
            const r2 = Array.from(document.querySelectorAll('.bar-row'));
            r2.forEach((r, j) => {
              r.style.display = (j >= grp && j < grp + 4) ? '' : 'none';
              r.style.opacity = '1';
            });
          }, delay);
          scheduledTimers.push(t1);
        }
      });
    }

    const totalMs = (cursor - ctx.currentTime) * 1000 + 50;

    
    musicStartTime = playStart; // tiempo real de inicio (post countIn)
    startProgressBar(playStart, totalMs);

      if (isLoopEnabled()) {
      const loopT = setTimeout(() => {
        if (currentStop) playOnce(cursor);
      }, totalMs - 50);
      scheduledTimers.push(loopT);
    } else {
      
      const capturedGen = myGeneration;
      const endT = setTimeout(() => {
        if (playGeneration !== capturedGen) return; // ciclo invalidado — no tocar is-playing
        clearAllHighlights();
        if (btn) { btn.classList.remove('playing'); btn.textContent = '▶ Play'; }
        document.body.classList.remove('is-playing');
        document.getElementById('output').style.display = 'none';
        currentStop = null;
      }, totalMs + 1000);
      scheduledTimers.push(endT);
    }
  };

  currentStop = () => {
    scheduledTimers.forEach(clearTimeout);
    scheduledTimers = [];
    killAllOscillators();
    clearAllHighlights();
    if (btn) { btn.classList.remove('playing'); btn.textContent = '▶ Play'; }
    // Solo remover is-playing si somos el ciclo actual
    if (playGeneration === myGeneration) {
      document.body.classList.remove('is-playing');
    }
    currentStop = null;
  };

  playOnce();
}

let playStartTime = 0;
let totalPlayDuration = 0;
let progressTimer = null;
let pausedAtSec = 0;
let isPaused = false;
let isPlayingNow = false;

// ── DEBUG MODE ────────────────────────────────────────────────────────────────
const DEBUG_AUDIO = false; // cambiar a true para activar

const _dbg = {
  loopCount: 0,
  lastLoopTime: null,
  expectedInterval: null,
  driftAcc: 0,
  timerLog: new Set(),
  callbackFired: new Map(),

  log(...args) { if (DEBUG_AUDIO) console.log('[DBG]', ...args); },

  trackTimer(id, label) {
    if (!DEBUG_AUDIO) return;
    this.timerLog.add({ id, label, ts: performance.now() });
  },

  releaseTimer(id) {
    if (!DEBUG_AUDIO) return;
    this.timerLog.forEach(t => { if (t.id === id) this.timerLog.delete(t); });
  },

  loopStart(seekSec, expectedMs) {
    if (!DEBUG_AUDIO) return;
    const now = performance.now();
    if (this.lastLoopTime !== null) {
      const actualInterval = now - this.lastLoopTime;
      const drift = actualInterval - this.expectedInterval;
      this.driftAcc += drift;
      this.loopCount++;
      console.log(`[DBG] Loop #${this.loopCount} | esperado: ${this.expectedInterval?.toFixed(1)}ms | real: ${actualInterval.toFixed(1)}ms | drift: ${drift.toFixed(1)}ms | acum: ${this.driftAcc.toFixed(1)}ms`);
    }
    this.lastLoopTime = now;
    this.expectedInterval = expectedMs;
    this.log(`→ Seek a ${seekSec.toFixed(3)}s | timers activos: ${scheduledTimers.length}`);
  },

  checkDuplicateCallback(gen, label) {
    if (!DEBUG_AUDIO) return false;
    const key = `${gen}-${label}`;
    if (this.callbackFired.has(key)) {
      console.warn(`[DBG] ⚠ Callback duplicado: ${key}`);
      return true;
    }
    this.callbackFired.set(key, performance.now());
    return false;
  },

  checkLeaks() {
    if (!DEBUG_AUDIO) return;
    console.log(`[DBG] Timers en scheduledTimers: ${scheduledTimers.length}`);
    if (scheduledTimers.length > 200) console.warn('[DBG] ⚠ Posible leak de timers');
    // Verificar notas colgadas
    const activeNotes = document.querySelectorAll('.note.active').length;
    if (activeNotes > 0) console.warn(`[DBG] ⚠ ${activeNotes} nota(s) colgada(s) antes del retorno`);
    // Verificar osciladores activos
    if (typeof activeOscillators !== 'undefined') {
      console.log(`[DBG] Osciladores activos: ${activeOscillators.length}`);
      if (activeOscillators.length > 0) console.warn('[DBG] ⚠ Osciladores no liberados');
    }
  },

  reset() {
    if (!DEBUG_AUDIO) return;
    this.loopCount = 0; this.lastLoopTime = null;
    this.expectedInterval = null; this.driftAcc = 0;
    this.timerLog.clear(); this.callbackFired.clear();
    this.log('Debug reset');
  }
};

// ── LOOP A-B ──────────────────────────────────────────────────────────────────
let loopStartBar = null;
let loopEndBar   = null;
let loopABEnabled = false;

function getBarDuration() {
  const bpm = getBpm();
  const swing = isSwing();
  return swing ? ((60/bpm)*(2/3) + (60/bpm)*(1/3)) * 4 : (60/(bpm*2)) * 4;
}

function getBarStartSec(barIdx) {
  return barIdx * getBarDuration();
}

function setLoopAB(startBar, endBar) {
  loopStartBar = startBar;
  loopEndBar   = endBar;
  loopABEnabled = true;
}

function clearLoopAB() {
  loopStartBar = null;
  loopEndBar   = null;
  loopABEnabled = false;
}

function startProgressBar(ctxStartTime, totalMs) {
  playStartTime = ctxStartTime;
  musicStartTime = ctxStartTime; // tiempo real de inicio de música
  totalPlayDuration = totalMs / 1000;
  const fill = document.getElementById('progress-bar-fill');
  if (!fill) return;
  fill.style.width = '0%';
  if (progressTimer) clearInterval(progressTimer);
  progressTimer = setInterval(() => {
    const ctx = getAudioCtx();
    const elapsedSec = ctx.currentTime - playStartTime;
    const pct = Math.min(1, elapsedSec / totalPlayDuration) * 100;
    fill.style.width = pct + '%';
  }, 100);
}

function stopProgressBar() {
  if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
  const fill = document.getElementById('progress-bar-fill');
  if (fill) fill.style.width = '0%';
}

function formatTime(sec) {
  const s = Math.max(0, Math.floor(sec));
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

let isScrubbing = false;
let musicStartTime = 0;

function playAllFrom(seekSec) {
  // AUDIO GATE: único punto de control — evita re-entradas
  if (!audioSequences.length) return;
  const fromGen = ++playGeneration;
  const ctx = getAudioCtx();
  const playStart = ctx.currentTime + 0.05;
  let cursor = playStart;
  const barStartTimes = [];
  const bpm = getBpm();
  const swing = isSwing();
  const barDuration = swing
    ? ((60/bpm)*(2/3) + (60/bpm)*(1/3)) * 4
    : (60/(bpm*2)) * 4;

  let startBarIdx = 0;
  let timeAcc = 0;
  for (let i = 0; i < audioSequences.length; i++) {
    if (timeAcc + barDuration > seekSec) { startBarIdx = i; break; }
    timeAcc += barDuration;
    if (i === audioSequences.length - 1) startBarIdx = i;
  }
  lastVisibleGroup = Math.floor(startBarIdx / 4) * 4;

  audioSequences.slice(startBarIdx).forEach((seq, relIdx) => {
    const absIdx = startBarIdx + relIdx;
    barStartTimes.push(cursor);
    if (!seq.notes.length) { cursor += barDuration; return; }
    const timings = getNoteTimings(seq.notes.length, cursor);
    const dir = seq.direction === 'down' ? 'down' : 'up';
    const startOct = getStartOctave(seq.notes, dir);
    const freqs = resolveFreqs(seq.notes, dir, startOct);
    seq.notes.forEach((note, i) => {
      const freq = freqs[i];
      if (!freq) return;
      const { startTime, duration } = timings[i];
      playTone(ctx, freq, startTime, duration);
      const onDelay  = (startTime - ctx.currentTime) * 1000;
      const offDelay = onDelay + duration * 1000;
      const onT  = setTimeout(() => highlightNote(absIdx, i, true),  Math.max(0, onDelay));
      const offT = setTimeout(() => highlightNote(absIdx, i, false), Math.max(0, offDelay));
      scheduledTimers.push(onT, offT);
    });
    cursor = timings[timings.length - 1].startTime + timings[timings.length - 1].duration;
  });

  // Calcular totalMs de toda la progresión (no solo del fragmento)
  const fullTotalMs = totalPlayDuration > 0
    ? totalPlayDuration * 1000
    : (cursor - ctx.currentTime) * 1000 + seekSec * 1000;
  startProgressBar(playStart - seekSec, fullTotalMs);

  const rows = Array.from(document.querySelectorAll('.bar-row'));
  if (rows.length > 0) {
    document.getElementById('output').style.display = '';
    rows.forEach((r, j) => r.style.display = (j >= lastVisibleGroup && j < lastVisibleGroup + 4) ? '' : 'none');
    barStartTimes.forEach((t, i) => {
      const absI = startBarIdx + i;
      if (absI > 0 && absI % 4 === 0) {
        const grp = Math.floor(absI / 4) * 4;
        const delay = Math.max(0, (t - ctx.currentTime) * 1000);
        const t1 = setTimeout(() => {
          lastVisibleGroup = grp;
          const r2 = Array.from(document.querySelectorAll('.bar-row'));
          r2.forEach((r, j) => r.style.display = (j >= grp && j < grp + 4) ? '' : 'none');
        }, delay);
        scheduledTimers.push(t1);
      }
    });
  }

  if (isMetroEnabled()) scheduleMetronome(ctx, barStartTimes, true);

  const totalMs = (cursor - ctx.currentTime) * 1000 + 50;
  const btn = document.getElementById('btn-play-all');
  const capturedFromGen = playGeneration;
  // Loop A-B tiene prioridad sobre loop global
  if (loopABEnabled && loopStartBar !== null && loopEndBar !== null) {
    const barDur = getBarDuration();
    const loopEndAbsSec = (loopEndBar + 1) * barDur;
    const loopStartAbsSec = loopStartBar * barDur;
    const loopEndCtxTime = playStart + (loopEndAbsSec - seekSec);
    const loopEndDelayMs = (loopEndCtxTime - ctx.currentTime) * 1000;
    const loopSeekSec = loopStartAbsSec;
    const capturedGen2 = playGeneration;

    _dbg.log(`Loop A-B: compás ${loopStartBar}→${loopEndBar} | seekSec=${seekSec.toFixed(2)} | delay=${loopEndDelayMs.toFixed(0)}ms`);

    if (loopEndDelayMs > 50) {
      const loopT = setTimeout(() => {
        if (_dbg.checkDuplicateCallback(capturedGen2, 'loopAB')) return;
        if (currentStop && playGeneration === capturedGen2) {
          _emitPlayEvent({ type: 'loop', fromBar: loopEndBar, toBar: loopStartBar, seekSec: loopSeekSec });
          prepareSeek(loopSeekSec);
          _dbg.loopStart(loopSeekSec, loopEndDelayMs);
          _dbg.checkLeaks();
          playAllFrom(loopSeekSec);
        } else {
          _dbg.log(`Loop cancelado (gen ${capturedGen2} vs ${playGeneration})`);
        }
      }, loopEndDelayMs - 50);
      scheduledTimers.push(loopT);
    } else {
      _dbg.log(`⚠ loopEndDelayMs=${loopEndDelayMs.toFixed(0)}ms ≤ 50 — loop ignorado este ciclo`);
    }
  } else if (isLoopEnabled()) {
    const loopT = setTimeout(() => { if (currentStop && playGeneration === capturedFromGen) playAllFrom(0); }, totalMs - 50);
    scheduledTimers.push(loopT);
  } else {
    const endT = setTimeout(() => {
      if (playGeneration !== capturedFromGen) return;
      clearAllHighlights();
      if (btn) { btn.classList.remove('playing'); btn.textContent = '▶ Play'; }
      document.body.classList.remove('is-playing');
      document.getElementById('output').style.display = 'none';
      stopProgressBar();
      currentStop = null;
    }, totalMs + 1000);
    scheduledTimers.push(endT);
  }

  currentStop = () => {
    scheduledTimers.forEach(clearTimeout);
    scheduledTimers = [];
    killAllOscillators();
    clearAllHighlights();
    if (btn) { btn.classList.remove('playing'); btn.textContent = '▶ Play'; }
    if (playGeneration === capturedFromGen) document.body.classList.remove('is-playing');
    stopProgressBar();
    currentStop = null;
  };
}

let toggleDebounce = false;
function togglePlayPause() {
  if (toggleDebounce) return;
  toggleDebounce = true;
  setTimeout(() => { toggleDebounce = false; }, 400);

  if (isPaused) {
    isPaused = false;
    isPlayingNow = true;
    updatePlayBtn(true);
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') {
      ctx.resume().then(() => playAllFrom(pausedAtSec));
    } else {
      playAllFrom(pausedAtSec);
    }
  } else {
    if (totalPlayDuration > 0) {
      const elapsed = getAudioCtx().currentTime - musicStartTime;
      pausedAtSec = Math.max(0, Math.min(elapsed, totalPlayDuration));
    }
    isPaused = true;
    isPlayingNow = false;
    scheduledTimers.forEach(clearTimeout);
    scheduledTimers = [];
    killAllOscillators();
    clearAllHighlights();
    if (currentStop) { currentStop = null; }
    stopProgressBar();
    updatePlayBtn(false);
    const rows = Array.from(document.querySelectorAll('.bar-row'));
    rows.forEach((r, j) => r.style.display = (j >= lastVisibleGroup && j < lastVisibleGroup + 4) ? '' : 'none');
  }
}

  if (loopA !== null) {

    markerA.style.display = '';
    markerA.style.left = pctA + '%';

  }

  if (loopB !== null) {

    const pctA = (loopA / totalPlayDuration) * 100;
    range.style.display = '';
    range.style.left  = pctA + '%';
    range.style.width = (pctB - pctA) + '%';
  } else {
    markerB.style.display = 'none';
    range.style.display = 'none';
  }
}

// ── TIMELINE SCRUBBER ─────────────────────────────────────────────────────────
function getScrubPct(e) {
  const track = document.getElementById('progress-bar-track');
  if (!track) return 0;
  const rect = track.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
}

function prepareSeek(seekSec) {
  scheduledTimers.forEach(clearTimeout);
  scheduledTimers = [];
  killAllOscillators();
  clearAllHighlights();
  currentStop = null;
  pausedAtSec = seekSec;
  isPaused = false;
  isPlayingNow = true;
  updatePlayBtn(true);
  _emitPlayEvent({ type: 'seek', seekSec });
}

function doSeek(seekSec) {
  prepareSeek(seekSec);
  playAllFrom(seekSec);
}

function getBarDurationSec() {
  const bpm = getBpm();
  return isSwing()
    ? ((60/bpm)*(2/3) + (60/bpm)*(1/3)) * 4
    : (60/(bpm*2)) * 4;
}

function rewind() {
  const N = getBarDurationSec() * 2; // 2 compases atrás
  const seekSec = Math.max(0, pausedAtSec - N);
  // Limpiar audio actual
  scheduledTimers.forEach(clearTimeout);
  scheduledTimers = [];
  killAllOscillators();
  clearAllHighlights();
  currentStop = null;
  // Reanudar desde nueva posición
  pausedAtSec = seekSec;
  isPaused = false;
  isPlayingNow = true;
  updatePlayBtn(true);
  playAllFrom(seekSec);
}

function fastForward() {
  const N = getBarDurationSec() * 2; // 2 compases adelante
  const seekSec = Math.min(totalPlayDuration, pausedAtSec + N);
  // Limpiar audio actual
  scheduledTimers.forEach(clearTimeout);
  scheduledTimers = [];
  killAllOscillators();
  clearAllHighlights();
  currentStop = null;
  // Reanudar desde nueva posición
  pausedAtSec = seekSec;
  isPaused = false;
  isPlayingNow = true;
  updatePlayBtn(true);
  playAllFrom(seekSec);
}

function restartPlay() {
  scheduledTimers.forEach(clearTimeout);
  scheduledTimers = [];
  killAllOscillators();
  clearAllHighlights();
  currentStop = null;
  document.querySelectorAll('.btn-play-bar').forEach(b => b.classList.remove('playing'));
  isPaused = false;
  pausedAtSec = 0;
  isPlayingNow = false;
  musicStartTime = 0;
  playStartTime = 0;
  totalPlayDuration = 0;
  lastVisibleGroup = 0;
  stopProgressBar();
  document.body.classList.add('is-playing');
  document.getElementById('output').style.display = '';
  const ppBtn = document.getElementById('btn-play-pause');
  updatePlayBtn(true);
  playAll(true);
}

function playTick() {
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    osc.connect(env);
    env.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = 1800;
    env.gain.setValueAtTime(0.15, now);
    env.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    osc.start(now);
    osc.stop(now + 0.07);
  } catch(e) {}
}

function playTickPlay() {
  // Play: dos notas graves ascendentes — tipo "launch"
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    [330, 495].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const env = ctx.createGain();
      osc.connect(env);
      env.connect(ctx.destination);
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const t = now + i * 0.07;
      env.gain.setValueAtTime(0.2, t);
      env.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc.start(t);
      osc.stop(t + 0.12);
    });
  } catch(e) {}
}

function playTickClear() {
  // Woosh descendente
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    const bufferSize = ctx.sampleRate * 0.25;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(800, now);
    filter.frequency.exponentialRampToValueAtTime(80, now + 0.22);
    filter.Q.value = 0.8;
    const env = ctx.createGain();
    env.gain.setValueAtTime(0.25, now);
    env.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
    noise.connect(filter);
    filter.connect(env);
    env.connect(ctx.destination);
    noise.start(now);
    noise.stop(now + 0.25);
  } catch(e) {}
}

function playClick(ctx, startTime, accent) {
  const osc = ctx.createOscillator();
  const env = ctx.createGain();

  osc.frequency.value = accent ? 1200 : 900;
  env.gain.setValueAtTime(accent ? 0.3 : 0.15, startTime);
  env.gain.exponentialRampToValueAtTime(0.001, startTime + 0.04);
  osc.start(startTime);
  osc.stop(startTime + 0.05);

  osc.onended = () => {
    activeOscillators = activeOscillators.filter(o => o.osc !== osc);
  };
}

function playCountIn(ctx, startTime) {
  if (startTime <= ctx.currentTime) return;
  const osc = ctx.createOscillator();
  const env = ctx.createGain();
  osc.connect(env);
  env.connect(ctx.destination);
  osc.type = 'triangle';
  osc.frequency.value = 660;
  env.gain.setValueAtTime(0.2, startTime);
  env.gain.exponentialRampToValueAtTime(0.001, startTime + 0.08);
  osc.start(startTime);
  osc.stop(startTime + 0.09);
  activeOscillators.push({ osc, env });
  osc.onended = () => { activeOscillators = activeOscillators.filter(o => o.osc !== osc); };
}

function scheduleMetronome(ctx, barStartTimes, noCountIn = false) {
  if (!barStartTimes.length) return;
  const t0 = barStartTimes[0];
  const barDuration = barStartTimes.length > 1
    ? barStartTimes[1] - barStartTimes[0]
    : (60 / getBpm()) * 4;
  const countInAudible = !noCountIn && (document.getElementById('countin-chk')?.checked ?? true);
  if (countInAudible) {
    // CountIn con Web Audio para precisión
    playCountIn(ctx, t0 - barDuration * 0.5);
    playCountIn(ctx, t0 - barDuration * 0.25);
  }
  // Metrónomo con Web Audio API (sample-accurate)
  barStartTimes.forEach(t => playClick(ctx, t, true));
}

function generateABC(withDir) {
  if (!withDir || !withDir.length) return '';

  
  
  
  const semitoneToABC = (semi, octave) => {
    const names = ['C','D','E','F','G','A','B'];
    const accs =  ['' ,'' ,'' ,'' ,'' ,'' ,'' ];
    
    const noteMap = [
      'C', '^C', 'D', '_E', 'E', 'F', '^F', 'G', '_A', 'A', '_B', 'B'
    ];
    const noteName = noteMap[semi % 12];
    
    if (octave === 3) return noteName + ',';
    if (octave === 4) return noteName;
    if (octave === 5) return noteName.replace(/^([_^]?)(.*)/, (_, acc, n) => acc + n.toLowerCase());
    if (octave === 6) return noteName.replace(/^([_^]?)(.*)/, (_, acc, n) => acc + n.toLowerCase()) + "'";
    return noteName;
  };

  
  const toSemi = n => NOTE_SEMITONE[n] !== undefined ? NOTE_SEMITONE[n] : -1;

  
  const placeNotes = (displayNotes, direction) => {
    if (!displayNotes || !displayNotes.length) return ['z'];
    const semis = displayNotes.map(toSemi).filter(s => s >= 0);
    if (!semis.length) return ['z'];

    const result = [];
    
    let oct = direction === 'down' ? 5 : 4;
    let prevSemi = semis[0];

    semis.forEach((semi, i) => {
      if (i === 0) {
        result.push(semitoneToABC(semi, oct));
        prevSemi = semi;
        return;
      }
      const diff = semi - prevSemi;
      if (direction === 'up') {
        if (diff < 0) oct++;
      } else {
        if (diff > 0) oct--;
      }
      
      oct = Math.max(4, Math.min(5, oct));
      result.push(semitoneToABC(semi, oct));
      prevSemi = semi;
    });
    return result;
  };

  let abc = 'X:1\nT:' + (currentProgName || '') + '\nM:4/4\nL:1/8\nK:C\n%%staffwidth 680\n%%scale 1.4\n%%gchordfont Helvetica 11\n%%annotationfont Helvetica 9\n';

  withDir.forEach((r, i) => {
    const chordName = (r.original || '').replace(/"/g, '').replace(/[^\w\s#b+\-]/g, '').trim();
    const scaleName = (r.scaleName || '').replace(/"/g, '').replace(/[^\w\s#b+\-→()]/g, '').trim();
    const dir = r.direction === 'up' ? '↑' : r.direction === 'down' ? '↓' : '';

    
    const chordLabel = chordName ? `"${chordName} ${dir}"` : '';
    const scaleLabel = scaleName ? `"_${scaleName}"` : '';

    if (!r.displayNotes || !r.displayNotes.length || r.scaleType === 'ref') {
      abc += `${chordLabel}${scaleLabel} z8 |`;
    } else {
      const notes = placeNotes(r.displayNotes, r.direction);
      const count = notes.length;
      const pad = count < 8 ? Array(8 - count).fill('z').join('') : '';
      abc += `${chordLabel}${scaleLabel} ${notes.join('')}${pad} |`;
    }

    if ((i + 1) % 4 === 0) abc += '\n';
  });

  return abc + '\n';
}

let transposeState = { semitones: 0, originalRaw: '' };

const FLAT_KEYS = new Set(['F','Bb','Eb','Ab','Db','Gb']);

function preferFlat(idx) {
  
  const flat = NOTES_FLAT[idx];
  const sharp = NOTES_SHARP[idx];
  
  return flat;
}

function transposeChordString(raw, semitones) {
  if (semitones === 0) return raw;
  const match = raw.trim().match(/^([A-G][b#]?)(.*)/);
  if (!match) return raw;
  const rootRaw = match[1];
  const quality = match[2];
  const norm = ENHARMONICS[rootRaw] || rootRaw;
  const idx = NOTES_SHARP.indexOf(norm);
  if (idx === -1) return raw;
  const newIdx = ((idx + semitones) % 12 + 12) % 12;

  
  const originalWasFlat = rootRaw.includes('b');
  const sharp = NOTES_SHARP[newIdx];
  const flat = NOTES_FLAT[newIdx];
  
  let newRoot;
  if (sharp === flat) {
    newRoot = sharp;
  } else if (originalWasFlat) {
    newRoot = flat;
  } else {
    
    newRoot = flat.includes('b') ? flat : sharp;
  }
  return newRoot + quality;
}

function transposeProgression(raw, semitones) {
  if (semitones === 0) return raw;
  
  return raw.replace(/([A-G][b#]?[^\s\/|]*)/g, m => transposeChordString(m, semitones));
}

function stepTranspose(delta) {
  playTick();
  transposeState.semitones = ((transposeState.semitones + delta + 12) % 24) - 12;
  
  if (transposeState.semitones > 11) transposeState.semitones -= 12;
  if (transposeState.semitones < -11) transposeState.semitones += 12;
  document.getElementById('semitone-val').textContent =
    (transposeState.semitones > 0 ? '+' : '') + transposeState.semitones;
  document.getElementById('target-key').value = '';
  updateTransposePreview();
}

function setTargetKey(targetNote) {
  if (!targetNote) return;
  const raw = transposeState.originalRaw;
  
  const match = raw.match(/([A-G][b#]?)/);
  if (!match) return;
  const firstRoot = match[1];
  const norm = ENHARMONICS[firstRoot] || firstRoot;
  const fromIdx = NOTES_SHARP.indexOf(norm);
  const toNorm = ENHARMONICS[targetNote] || targetNote;
  const toIdx = NOTES_SHARP.indexOf(toNorm);
  if (fromIdx === -1 || toIdx === -1) return;
  let semitones = (toIdx - fromIdx + 12) % 12;
  if (semitones > 6) semitones -= 12; 
  transposeState.semitones = semitones;
  document.getElementById('semitone-val').textContent =
    (semitones > 0 ? '+' : '') + semitones;
  updateTransposePreview();
}

function updateTransposePreview() {
  const preview = document.getElementById('transpose-preview');
  const transposed = transposeProgression(transposeState.originalRaw, transposeState.semitones);
  if (transposeState.semitones === 0) {
    preview.innerHTML = '<span style="color:var(--dim)">sin cambio</span>';
  } else {
    preview.innerHTML = `→ <span class="prog">${transposed}</span>`;
  }
}

function applyTranspose() {
  if (transposeState.semitones === 0) return;
  const transposed = transposeProgression(transposeState.originalRaw, transposeState.semitones);
  document.getElementById('input').value = transposed;
  audioSequences = [];
  document.getElementById('output').innerHTML = '';
  document.getElementById('output').style.display = 'none';
  checkPlayBtn();
  playTickTranspose();

  const badge = document.getElementById('transpose-badge');

    const s = transposeState.semitones;
    badge.textContent = (s > 0 ? '+' : '') + s + ' semi';
    badge.style.display = '';
  }
}

function updateCleanPreview() {
  const raw = document.getElementById('input')?.value || '';
  const preview = document.getElementById('clean-preview');
  const previewText = document.getElementById('clean-preview-text');
  if (!preview || !previewText) return;
  if (!raw.trim()) { preview.classList.remove('visible'); return; }
  // Obtener progresión limpia
  const step1 = sanitizeProgression(raw);
  const parts = step1.split(/(\s*\/\s*)/);
  const cleaned = parts.map(part => {
    if (/^\s*\/\s*$/.test(part)) return part;
    const tokens = part.trim().split(/\s+/);
    const valid = tokens.filter(t => t && parseChord(t));
    return valid.join(' ');
  }).join('');
  const result = cleaned
    .replace(/(\s*\/\s*){2,}/g, ' / ')
    .replace(/^\s*\/\s*/, '')
    .replace(/\s*\/\s*$/, '')
    .trim();
  if (!result) { preview.classList.remove('visible'); return; }
  // Solo mostrar si hay diferencia con el input
  if (result === raw.trim()) {
    preview.classList.remove('visible');
  } else {
    previewText.textContent = result;
    preview.classList.add('visible');
  }
}

function sanitizeChords() {
  const input = document.getElementById('input');
  if (!input) return;
  const raw = input.value;
  if (!raw.trim()) return;
  // Paso 1: sanitizeProgression limpia formato
  const step1 = sanitizeProgression(raw);
  // Paso 2: filtrar tokens que parseChord no reconoce
  const parts = step1.split(/(\s*\/\s*)/);
  const cleaned = parts.map(part => {
    if (/^\s*\/\s*$/.test(part)) return part;
    const tokens = part.trim().split(/\s+/);
    const valid = tokens.filter(t => t && parseChord(t));
    return valid.join(' ');
  }).join('');
  const result = cleaned
    .replace(/(\s*\/\s*){2,}/g, ' / ')
    .replace(/^\s*\/\s*/, '')
    .replace(/\s*\/\s*$/, '')
    .trim();
  const changed = result !== raw.trim();
  if (!changed) return;
  input.value = result;
  // iOS Safari trick: scroll fuerza refresco visual
  input.scrollTop = 0;
  input.scrollTop = input.scrollHeight;
  audioSequences = [];
  checkPlayBtn();
  showToast('Tokens inválidos eliminados');
}

// Swipe para borrar
let swipeStartX = 0;
let swipeThreshold = 60;

function libSwipeStart(e, el) {
  swipeStartX = e.touches[0].clientX;
  el.style.transition = 'none';
}

function libSwipeMove(e, el) {
  const dx = e.touches[0].clientX - swipeStartX;
  if (dx < 0) {
    el.style.transform = `translateX(${Math.max(dx, -72)}px)`;
  } else if (el.classList.contains('swiped')) {
    el.style.transform = `translateX(${Math.min(dx - 72, 0)}px)`;
  }
}

function libSwipeEnd(e, el, name) {
  el.style.transition = 'transform 0.2s ease';
  const dx = e.changedTouches[0].clientX - swipeStartX;
  if (dx < -swipeThreshold) {
    el.classList.add('swiped');
    el.style.transform = 'translateX(-72px)';
  } else {
    el.classList.remove('swiped');
    el.style.transform = 'translateX(0)';
  }
}

// ── BPM BUTTONS ──────────────────────────────────────────────────────────────
let bpmPressTimer = null;
let bpmPressInterval = null;
let bpmPressCount = 0;

function playTickBpm() {
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    osc.connect(env); env.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1200, now);
    osc.frequency.exponentialRampToValueAtTime(600, now + 0.04);
    env.gain.setValueAtTime(0.3, now);
    env.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
    osc.start(now); osc.stop(now + 0.06);
  } catch(e) {}
}

function bpmPressStart(delta, e) {
  if (e) e.preventDefault();
  bpmStep(delta);
  bpmPressCount = 0;
  bpmPressTimer = setTimeout(() => {
    bpmPressInterval = setInterval(() => {
      bpmPressCount++;
      const step = bpmPressCount > 20 ? 5 : bpmPressCount > 8 ? 2 : 1;
      bpmStep(delta * step);
    }, 80);
  }, 400);
}

function bpmPressEnd() {
  clearTimeout(bpmPressTimer);
  clearInterval(bpmPressInterval);
  bpmPressTimer = null; bpmPressInterval = null; bpmPressCount = 0;
}

function bpmStep(delta) {
  const slider = document.getElementById('bpm-slider');
  const current = parseInt(slider.value, 10);
  const next = Math.max(40, Math.min(240, current + delta));
  if (next === current) {
    // Llegó al límite — detener el intervalo
    bpmPressEnd();
    return;
  }
  slider.value = next;
  playTickBpm();
  updateBpm(next);
}

<!-- ══════════════════════════════════════════════════════════════════
     LABORATORIO DE VALIDACIÓN — MÓDULO TEMPORAL
     Para eliminar: quitar este bloque completo
     ══════════════════════════════════════════════════════════════════ -->
<script>

// ── CLASIFICADOR BASELINE ─────────────────────────────────────────────────────
function _labClassify(prog) {
  try {
    const bars = parseInput(prog);
    if (!bars.length) return { mode: 'error', key: null };
    const tc = detectTonalCenter(bars);
    if (!tc) return { mode: 'other', key: null };
    return { mode: tc.isMajor ? 'major' : 'minor', key: tc.rootName };
  } catch(e) { return { mode: 'error', key: null }; }
}

// ── TONAL FILTER V2 ───────────────────────────────────────────────────────────
function TonalFilterV2(prog) {
  try {
    const bars = parseInput(prog);
    if (!bars.length) return { mode: 'ambiguous', confidence: 0 };
    let majorScore = 0, minorScore = 0;
    bars.forEach((bar, barIdx) => {
      bar.chords.forEach((chord, chordIdx) => {
        const isLast = (barIdx === bars.length - 1 && chordIdx === bar.chords.length - 1);
        const name = chord.raw || '';
        const weight = isLast ? 3 : (barIdx === 0 ? 1.5 : 1);
        const isMinor = /m7b5|m7|m9|m6|m$|min/.test(name) && !/maj/i.test(name);
        const isMajor = /maj7|maj9|maj6|6$/.test(name) || /^[A-G][b#]?$/.test(name.replace(/\s/g,''));
        const isDom7 = /^[A-G][b#]?7/.test(name);
        const isHalfDim = /m7b5|ø/.test(name);
        if (isMajor) majorScore += weight;
        if (isMinor && !isHalfDim) minorScore += weight;
        if (isDom7) majorScore += weight * 0.5;
        if (isHalfDim) minorScore += weight * 1.2;
        if (isLast) {
          if (isMajor) majorScore += 3;
          if (isMinor) minorScore += 3;
        }
      });
    });
    const total = majorScore + minorScore;
    if (total === 0) return { mode: 'ambiguous', confidence: 0 };
    const majorRatio = majorScore / total;
    const minorRatio = minorScore / total;
    const confidence = Math.abs(majorRatio - minorRatio);
    if (confidence < 0.2) return { mode: 'ambiguous', confidence };
    return { mode: majorRatio > minorRatio ? 'major' : 'minor', confidence };
  } catch(e) { return { mode: 'ambiguous', confidence: 0 }; }
}

// ── CADENCE CLOSURE DETECTOR ──────────────────────────────────────────────────
function cadenceClosureDetector(bars) {
  const allChords = [];
  bars.forEach(bar => bar.chords.forEach(chord => allChords.push(chord)));
  const resolutions = {};
  for (let i = 0; i < allChords.length - 1; i++) {
    const a = allChords[i], b = allChords[i+1];
    const intv = ((b.idx - a.idx) + 12) % 12;
    if (a.type === 'dominant' && (intv === 5 || intv === 1)) resolutions[i] = b.idx;
  }
  const closureCount = {};
  Object.values(resolutions).forEach(r => { closureCount[r] = (closureCount[r] || 0) + 1; });
  let structuralRoot = null, maxClosures = 0;
  Object.entries(closureCount).forEach(([root, count]) => {
    if (count > maxClosures) { maxClosures = count; structuralRoot = parseInt(root); }
  });
  const totalDominants = allChords.filter(c => c.type === 'dominant').length;
  const closureRatio = totalDominants > 0 ? Object.keys(resolutions).length / totalDominants : 0;
  return { structuralRoot, maxClosures, closureRatio, hasClosure: maxClosures >= 1 && closureRatio >= 0.3 };
}

// ── DECISION ENGINE (3 capas: KEY / MODE / STRUCTURE) ─────────────────────────
function _deClassifyStructure(bars, allChords) {
  const total = allChords.length;
  if (total === 0) return 'empty';
  const domRoots = {};
  allChords.forEach(c => { if (c.type === 'dominant') domRoots[c.idx] = (domRoots[c.idx] || 0) + 1; });
  const domCenters = Object.keys(domRoots).length;
  const totalDoms = allChords.filter(c => c.type === 'dominant').length;
  const domRatio = totalDoms / total;
  if (domRatio >= 0.4 && domCenters >= 2) return 'blues';
  const uniqueRoots = new Set(allChords.map(c => c.idx)).size;
  if (uniqueRoots <= 2 && totalDoms === 0) return 'modal_static';
  if (total >= 4 && total <= 8) {
    const half = Math.floor(total / 2);
    let isRepeat = true;
    for (let i = 0; i < half; i++) {
      if (allChords[i].idx !== allChords[i + half]?.idx) { isRepeat = false; break; }
    }
    if (isRepeat) return 'turnaround_cycle';
  }
  for (let i = 0; i < allChords.length - 2; i++) {
    const a = allChords[i], b = allChords[i+1], c = allChords[i+2];
    const ab = ((b.idx - a.idx) + 12) % 12;
    const bc = ((c.idx - b.idx) + 12) % 12;
    if ((a.type === 'minor' || a.type === 'halfDim') && b.type === 'dominant' && ab === 5 &&
        (c.type === 'major' || c.type === 'minor' || c.type === 'major6') && bc === 5) {
      return 'functional_tonal';
    }
  }
  if (domCenters >= 3 && domRatio >= 0.25) return 'multi_center';
  return 'functional_tonal';
}

function DecisionEngine(prog) {
  try {
    const bars = parseInput(prog);
    if (!bars.length) return { key: null, mode: 'ambiguous', structure: 'empty', confidence: 0 };
    const allChords = [];
    bars.forEach(bar => bar.chords.forEach(chord => allChords.push(chord)));
    const structure = _deClassifyStructure(bars, allChords);
    const v2 = TonalFilterV2(prog);
    let ambiguityThreshold = 0.20;
    if (structure === 'blues') ambiguityThreshold = 0.50;
    if (structure === 'turnaround_cycle') ambiguityThreshold = 0.40;
    if (structure === 'modal_static') ambiguityThreshold = 0.60;
    const mode = v2.confidence < ambiguityThreshold ? 'ambiguous' : v2.mode;
    let key = null;
    if (mode !== 'ambiguous') {
      const baselineScores = [];
      for (let root = 0; root < 12; root++) {
        const isMajor = mode === 'major';
        const { score } = scoreTonalCenter(bars, root, isMajor);
        baselineScores.push({ rootIdx: root, isMajor, score });
      }
      baselineScores.sort((a, b) => b.score - a.score);
      const best = baselineScores[0], second = baselineScores[1];
      const margin = (best.score - second.score) / (best.score || 1);
      const closure = cadenceClosureDetector(bars);
      const closureConfirms = closure.hasClosure && closure.structuralRoot === best.rootIdx;
      const keyThreshold = structure === 'functional_tonal' ? 0.10 : 0.20;
      if (margin >= keyThreshold || closureConfirms) key = NOTES_FLAT[best.rootIdx];
    }
    return { key, mode, structure, confidence: v2.confidence };
  } catch(e) { return { key: null, mode: 'ambiguous', structure: 'error', confidence: 0 }; }
}

function _labClassifyDE(prog) {
  const r = DecisionEngine(prog);
  return { mode: r.mode === 'ambiguous' ? 'other' : r.mode, key: r.key, structure: r.structure, confidence: r.confidence };
}

function runLab() {
  const results = LAB_COLLECTION.map(item => {
    const got = _labClassify(item.prog);
    const v2 = TonalFilterV2(item.prog);
    const de = _labClassifyDE(item.prog);
    const ok = got.mode === item.expected.mode &&
      (item.expected.key === null || got.key === item.expected.key);
    const expMode = item.expected.mode === 'other' ? 'ambiguous' : item.expected.mode;
    const v2ok = v2.mode === expMode;
    const deok = de.mode === item.expected.mode &&
      (item.expected.key === null || de.key === item.expected.key || de.key === null);
    return { ...item, got, v2, de, ok, v2ok, deok };
  });

  const total = results.length;
  const hits = results.filter(r => r.ok).length;
  const v2hits = results.filter(r => r.v2ok).length;
  const dehits = results.filter(r => r.deok).length;
  const pct = ((hits / total) * 100).toFixed(1);
  const v2pct = ((v2hits / total) * 100).toFixed(1);
  const depct = ((dehits / total) * 100).toFixed(1);
  const failures = results.filter(r => !r.ok);
  const v2failures = results.filter(r => !r.v2ok);
  const v2typeA = v2failures.filter(r => r.v2.mode === 'ambiguous');
  const v2typeB = v2failures.filter(r => r.v2.mode !== 'ambiguous');
  const deNullCount = results.filter(r => r.de.key === null && r.de.mode !== 'other').length;
  const deStructures = {};
  results.forEach(r => { deStructures[r.de.structure] = (deStructures[r.de.structure] || 0) + 1; });

  let html = `<div style="font-family:monospace;font-size:12px;padding:20px;background:#0a0a0a;color:#e8e8e8;position:fixed;inset:0;z-index:99999;overflow-y:auto;" id="lab-overlay">`;
  html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">`;
  html += `<span style="font-size:15px;font-weight:700;color:#c8a44a;">Laboratorio de Validación</span>`;
  html += `<button onclick="document.getElementById('lab-overlay').remove()" style="background:#333;color:#fff;border:none;padding:6px 12px;cursor:pointer;border-radius:4px;">✕ Cerrar</button>`;
  html += `</div>`;

  // Baseline
  html += `<div style="font-size:9px;color:#555;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;">Sistema actual (baseline)</div>`;
  html += `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;">`;
  html += `<div style="background:#111;padding:10px;border-radius:4px;text-align:center;"><div style="font-size:20px;font-weight:700;color:#4a8cc8;">${total}</div><div style="color:#555;font-size:9px;margin-top:2px;">Total</div></div>`;
  html += `<div style="background:#111;padding:10px;border-radius:4px;text-align:center;"><div style="font-size:20px;font-weight:700;color:#4a9;">${hits}</div><div style="color:#555;font-size:9px;margin-top:2px;">Aciertos</div></div>`;
  html += `<div style="background:#111;padding:10px;border-radius:4px;text-align:center;"><div style="font-size:20px;font-weight:700;color:#c84a4a;">${total-hits}</div><div style="color:#555;font-size:9px;margin-top:2px;">Errores</div></div>`;
  html += `<div style="background:#111;padding:10px;border-radius:4px;text-align:center;"><div style="font-size:20px;font-weight:700;color:${parseFloat(pct)>=80?'#4a9':parseFloat(pct)>=60?'#c8a44a':'#c84a4a'};">${pct}%</div><div style="color:#555;font-size:9px;margin-top:2px;">Precisión</div></div>`;
  html += `</div>`;

  // V2
  html += `<div style="font-size:9px;color:#555;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;">TonalFilter V2</div>`;
  html += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:6px;">`;
  html += `<div style="background:#111;padding:10px;border-radius:4px;text-align:center;"><div style="font-size:20px;font-weight:700;color:#4a9;">${v2hits}</div><div style="color:#555;font-size:9px;margin-top:2px;">Aciertos</div></div>`;
  html += `<div style="background:#111;padding:10px;border-radius:4px;text-align:center;"><div style="font-size:20px;font-weight:700;color:#c84a4a;">${total-v2hits}</div><div style="color:#555;font-size:9px;margin-top:2px;">Errores</div></div>`;
  html += `<div style="background:#111;padding:10px;border-radius:4px;text-align:center;"><div style="font-size:20px;font-weight:700;color:${parseFloat(v2pct)>=80?'#4a9':parseFloat(v2pct)>=60?'#c8a44a':'#c84a4a'};">${v2pct}%</div><div style="color:#555;font-size:9px;margin-top:2px;">Precisión</div></div>`;
  html += `</div>`;
  html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">`;
  html += `<div style="background:#0a0a14;padding:8px;border-radius:4px;text-align:center;border-left:3px solid #c8a44a;"><div style="font-size:16px;font-weight:700;color:#c8a44a;">${v2typeA.length}</div><div style="color:#555;font-size:9px;">Type A (over-abstention)</div></div>`;
  html += `<div style="background:#0a0a14;padding:8px;border-radius:4px;text-align:center;border-left:3px solid #c84a4a;"><div style="font-size:16px;font-weight:700;color:#c84a4a;">${v2typeB.length}</div><div style="color:#555;font-size:9px;">Type B (wrong decision)</div></div>`;
  html += `</div>`;

  // Decision Engine
  html += `<div style="font-size:9px;color:#4a8cc8;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;font-weight:700;">Decision Engine (KEY / MODE / STRUCTURE)</div>`;
  html += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;">`;
  html += `<div style="background:#111;padding:10px;border-radius:4px;text-align:center;"><div style="font-size:20px;font-weight:700;color:#4a9;">${dehits}</div><div style="color:#555;font-size:9px;margin-top:2px;">Aciertos</div></div>`;
  html += `<div style="background:#111;padding:10px;border-radius:4px;text-align:center;"><div style="font-size:20px;font-weight:700;color:#c84a4a;">${total-dehits}</div><div style="color:#555;font-size:9px;margin-top:2px;">Errores</div></div>`;
  html += `<div style="background:#111;padding:10px;border-radius:4px;text-align:center;"><div style="font-size:20px;font-weight:700;color:${parseFloat(depct)>=80?'#4a9':parseFloat(depct)>=60?'#c8a44a':'#c84a4a'};">${depct}%</div><div style="color:#555;font-size:9px;margin-top:2px;">Precisión</div></div>`;
  html += `</div>`;
  html += `<div style="background:#0a0a14;padding:8px;border-radius:4px;margin-bottom:14px;font-size:10px;color:#555;display:flex;flex-wrap:wrap;gap:8px;">`;
  html += `<span>KEY=null: <span style="color:#c8a44a;">${deNullCount}</span></span>`;
  Object.entries(deStructures).forEach(([k,v]) => { html += `<span>${k}: <span style="color:#4a8cc8;">${v}</span></span>`; });
  html += `</div>`;

  // Tabla de errores baseline con columnas V2 y DE
  if (failures.length) {
    html += `<div style="margin-bottom:6px;font-size:10px;color:#c84a4a;font-weight:700;text-transform:uppercase;">Errores baseline (${failures.length})</div>`;
    html += `<table style="width:100%;border-collapse:collapse;font-size:10px;margin-bottom:16px;">`;
    html += `<tr style="color:#555;border-bottom:1px solid #222;"><th style="text-align:left;padding:4px 6px;">Progresión</th><th style="padding:4px 6px;">Esperado</th><th style="padding:4px 6px;">Baseline</th><th style="padding:4px 6px;">V2</th><th style="padding:4px 6px;">DE</th><th style="padding:4px 6px;">Estructura</th></tr>`;
    failures.forEach(f => {
      const exp = f.expected.key ? f.expected.key + ' ' + f.expected.mode : f.expected.mode;
      const got = f.got.key ? f.got.key + ' ' + f.got.mode : f.got.mode;
      const v2r = f.v2.mode + (f.v2.confidence ? ' (' + (f.v2.confidence*100).toFixed(0) + '%)' : '');
      const der = (f.de.key ? f.de.key + ' ' : '') + f.de.mode;
      html += `<tr style="border-bottom:1px solid #111;">`;
      html += `<td style="padding:5px 6px;color:#aaa;">${f.name}</td>`;
      html += `<td style="padding:5px 6px;text-align:center;color:#4a9;">${exp}</td>`;
      html += `<td style="padding:5px 6px;text-align:center;color:#c84a4a;">${got}</td>`;
      html += `<td style="padding:5px 6px;text-align:center;color:${f.v2ok?'#4a9':'#c84a4a'};">${v2r}</td>`;
      html += `<td style="padding:5px 6px;text-align:center;color:${f.deok?'#4a9':'#c84a4a'};">${der}</td>`;
      html += `<td style="padding:5px 6px;text-align:center;color:#4a8cc8;font-size:9px;">${f.de.structure}</td>`;
      html += `</tr>`;
    });
    html += `</table>`;
  }
  html += `</div>`;

  const overlay = document.createElement('div');
  overlay.innerHTML = html;
  document.body.appendChild(overlay.firstChild);
}
</script>
<!-- ══ FIN LABORATORIO ══ -->
