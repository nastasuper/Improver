const NOTE_SEMITONE = {
  'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'Fb':4,'F':5,'F#':6,
  'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11,'Cb':11
};

function noteFreq(noteName, octave) {
  const semi = NOTE_SEMITONE[noteName];
  if (semi === undefined) return null;
  
  const midi = (octave + 1) * 12 + semi;
  return 440 * Math.pow(2, (midi - 69) / 12);
}

function simulateFreqs(notes, direction, startOctave) {
  const result = [];
  let oct = startOctave;
  let prevSemi = NOTE_SEMITONE[notes[0]];
  if (prevSemi === undefined) return [];
  result.push(noteFreq(notes[0], oct));
  for (let i = 1; i < notes.length; i++) {
    const s = NOTE_SEMITONE[notes[i]];
    if (s === undefined) continue;
    if (direction === 'up') { if (s <= prevSemi) oct++; }
    else                    { if (s >= prevSemi) oct--; }
    result.push(noteFreq(notes[i], oct));
    prevSemi = s;
  }
  return result;
}

function getStartOctave(notes, direction) {
  if (!notes.length) return 4;
  if (NOTE_SEMITONE[notes[0]] === undefined) return 4;
  const TARGET = 293; 
  let bestOct = 4;
  let bestDiff = Infinity;
  for (let oct = 2; oct <= 6; oct++) {
    const freqs = simulateFreqs(notes, direction, oct).filter(Boolean);
    if (!freqs.length) continue;
    const sorted = [...freqs].sort((a, b) => a - b);
    const median = sorted[Math.floor(sorted.length / 2)];
    const diff = Math.abs(median - TARGET);
    if (diff < bestDiff) { bestDiff = diff; bestOct = oct; }
  }
  return bestOct;
}

function resolveFreqs(notes, direction, startOctave) {
  if (!notes.length) return [];
  const freqs = [];
  let oct = startOctave;
  let prevSemi = NOTE_SEMITONE[notes[0]];
  freqs.push(noteFreq(notes[0], oct));

  for (let i = 1; i < notes.length; i++) {
    const semi = NOTE_SEMITONE[notes[i]];
    if (semi === undefined) { freqs.push(null); continue; }

    if (direction === 'up') {
      if (semi <= prevSemi) oct++;
    } else {
      
      
      const stepUp = ((semi - prevSemi) + 12) % 12;
      if (stepUp === 1) {
        
      } else if (semi >= prevSemi) {
        oct--;
      }
    }
    freqs.push(noteFreq(notes[i], oct));
    prevSemi = semi;
  }
  return freqs;
}

let activeOscillators = [];

function playTone(ctx, freq, startTime, duration) {
  
  
  const harmonics = [
    { ratio: 1,    gain: 0.6,  detune: 0    },
    { ratio: 2,    gain: 0.25, detune: 1.2  },
    { ratio: 3,    gain: 0.12, detune: -0.8 },
    { ratio: 4,    gain: 0.07, detune: 1.5  },
    { ratio: 5,    gain: 0.04, detune: -1.0 },
    { ratio: 6,    gain: 0.02, detune: 0.5  },
  ];

  
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = Math.min(freq * 12, 8000);
  filter.Q.value = 0.5;
  filter.connect(ctx.destination);

  
  const decayTime = Math.min(duration + 1.5, 4.0) * (1 + (300 / Math.max(freq, 100)));
  const normDecay = Math.min(decayTime, 5.0);

  harmonics.forEach(h => {
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    osc.connect(env);
    env.connect(filter);

    osc.type = 'sine';
    osc.frequency.value = freq * h.ratio;
    osc.detune.value = h.detune;

    
    const attack = 0.004;
    const peakGain = h.gain * 0.35;
    const sustainLevel = peakGain * 0.05;

    env.gain.setValueAtTime(0, startTime);
    env.gain.linearRampToValueAtTime(peakGain, startTime + attack);
    env.gain.exponentialRampToValueAtTime(
      Math.max(sustainLevel, 0.0001),
      startTime + attack + normDecay * (1 / h.ratio) 
    );
    env.gain.exponentialRampToValueAtTime(0.0001, startTime + duration + 0.3);

    osc.start(startTime);
    osc.stop(startTime + duration + 0.4);

    activeOscillators.push({ osc, env });
    osc.onended = () => {
      activeOscillators = activeOscillators.filter(o => o.osc !== osc);
    };
  });
}

function killAllOscillators() {
  const now = audioCtx ? audioCtx.currentTime : 0;
  activeOscillators.forEach(({ osc, env }) => {
    try {
      env.gain.cancelScheduledValues(now);
      env.gain.setValueAtTime(0, now);
      osc.stop(now);
    } catch(e) {}
  });
  activeOscillators = [];
  // Si hay un contexto activo, cerrarlo para matar osciladores futuros
  if (audioCtx) {
    try { audioCtx.close(); } catch(e) {}
    audioCtx = null;
  }
}

function getBpm() {
  return parseInt(document.getElementById('bpm-slider').value, 10);
}

function isSwing() {
  return document.getElementById('swing-chk').checked;
}

function getNoteTimings(noteCount, startTime, fillBar) {
  const bpm = getBpm();
  const swing = isSwing();
  const eighthStraight = 60 / (bpm * 2);
  const swingLong  = (60 / bpm) * (2/3);
  const swingShort = (60 / bpm) * (1/3);
  const beatDuration = 60 / bpm;
  const barDuration = beatDuration * 4; 

  const timings = [];
  let t = startTime;
  for (let i = 0; i < noteCount; i++) {
    const isLast = i === noteCount - 1;
    const isOddCount = noteCount % 2 === 1;
    let dur;
    if (isLast && fillBar) {
      
      const barEnd = startTime + barDuration;
      dur = Math.max(barEnd - t, swingLong);
    } else if (isLast && isOddCount) {
      dur = swing ? swingLong + swingShort : eighthStraight * 2;
    } else if (!swing) {
      dur = eighthStraight;
    } else {
      dur = (i % 2 === 0) ? swingLong : swingShort;
    }
    timings.push({ startTime: t, duration: dur });
    t += dur;
  }
  return timings;
}

function stopAll(keepOutput = false) {
  if (currentStop) { currentStop(); currentStop = null; }
  killAllOscillators();
  clearAllHighlights();
  scheduledTimers.forEach(clearTimeout);
  scheduledTimers = [];
  document.querySelectorAll('.btn-play-bar').forEach(b => b.classList.remove('playing'));
  const pa = document.getElementById('btn-play-all');
  if (pa) { pa.classList.remove('playing'); pa.textContent = '▶ Play'; }
  stopProgressBar();
  
  
  const rows = Array.from(document.querySelectorAll('.bar-row'));
  rows.forEach((r, j) => r.style.display = (j >= lastVisibleGroup && j < lastVisibleGroup + 4) ? '' : 'none');
}

function playSequence(seqIdx, btn) {
  stopAll();
  const seq = audioSequences[seqIdx];
  if (!seq || !seq.notes.length) return;

  const ctx = getAudioCtx();
  const now = ctx.currentTime + 0.05;
  const timings = getNoteTimings(seq.notes.length, now);
  const dir = seq.direction === 'down' ? 'down' : 'up';
  const startOct = getStartOctave(seq.notes, dir);
  const freqs = resolveFreqs(seq.notes, dir, startOct);

  seq.notes.forEach((note, i) => {
    const freq = freqs[i];
    if (!freq) return;
    const { startTime, duration } = timings[i];
    playTone(ctx, freq, startTime, duration);

    const onDelay = (startTime - ctx.currentTime) * 1000;
    const offDelay = onDelay + duration * 1000;
    const onT = setTimeout(() => highlightNote(seqIdx, i, true), Math.max(0, onDelay));
    const offT = setTimeout(() => highlightNote(seqIdx, i, false), Math.max(0, offDelay));
    scheduledTimers.push(onT, offT);
  });

  if (btn) btn.classList.add('playing');
  const endTime = timings[timings.length - 1].startTime + timings[timings.length - 1].duration;
  const totalDuration = endTime - now;

  
  if (isMetroEnabled()) scheduleMetronome(ctx, [now]);

  const endT = setTimeout(() => {
    clearAllHighlights();
    if (btn) btn.classList.remove('playing');
  }, totalDuration * 1000 + 100);
  scheduledTimers.push(endT);

  currentStop = () => { scheduledTimers.forEach(clearTimeout); scheduledTimers = []; };
}

function playAll(fromRestart = false) {
  // iOS: crear y reanudar AudioContext en respuesta a gesto del usuario
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  // Si viene de restart, siempre proceder independientemente del estado
  if (!fromRestart && isPlayingNow && !isPaused) return; // evitar doble reproducción solo si está activo y no pausado
  if (!audioSequences.length) {
    
    document.body.classList.add('is-playing');
    const playingTitle = document.getElementById('playing-title');
    if (playingTitle) {
      const progInput = document.getElementById('input').value.trim();
      const baseName = currentProgName || (progInput.length > 60 ? progInput.substring(0, 60) + '…' : progInput);
      playingTitle.textContent = baseName.toUpperCase().replace(/BB/g, 'Bb').replace(/EB/g, 'Eb').replace(/AB/g, 'Ab').replace(/DB/g, 'Db').replace(/GB/g, 'Gb');
    }
    analyze(true);
    setTimeout(() => playAll(true), 300);
    return;
  }
  if (!fromRestart) {
    stopAll(true);
    isPaused = false;
    pausedAtSec = 0;
  } else {
    // Limpieza explícita sin cambiar is-playing
    isPaused = false;
    pausedAtSec = 0;
    scheduledTimers.forEach(clearTimeout);
    scheduledTimers = [];
    killAllOscillators();
    clearAllHighlights();
    if (currentStop) { currentStop = null; }
    stopProgressBar();
  }
  isPlayingNow = true;
  document.body.classList.add('is-playing');
  document.getElementById('output').style.display = '';
  const ppBtn2 = document.getElementById('btn-play-pause');
  updatePlayBtn(true);

  const playingTitle = document.getElementById('playing-title');
  if (playingTitle) {
    const progInput = document.getElementById('input').value.trim();
    const baseName = currentProgName || (progInput.length > 60 ? progInput.substring(0, 60) + '…' : progInput);
    const ctxNames = { blues: 'Blues', jazzblues: 'Jazz Blues', bluesmenor: 'Blues Menor', rhythmchanges: 'Rhythm Changes', general: 'General' };
    const ctxLabel = ctxNames[currentContext] && currentContext !== 'general' ? ` · ${ctxNames[currentContext]}` : '';
    playingTitle.textContent = (baseName + ctxLabel).toUpperCase().replace(/BB/g, 'Bb').replace(/EB/g, 'Eb').replace(/AB/g, 'Ab').replace(/DB/g, 'Db').replace(/GB/g, 'Gb');
  }

  const btn = document.getElementById('btn-play-all');
  if (btn) { btn.classList.add('playing'); btn.textContent = '■ Tocando...'; }

  const ctx = getAudioCtx();

  const myGeneration = ++playGeneration;
  const playOnce = (startCursor) => {
    if (playGeneration !== myGeneration) return; // ciclo invalidado
    const bpmNow = getBpm();
    const barDurationNow = isSwing()
      ? ((60/bpmNow)*(2/3) + (60/bpmNow)*(1/3)) * 4
      : (60/(bpmNow*2)) * 4;
    const countInDuration = (!startCursor && isMetroEnabled()) ? barDurationNow : 0;
    const playStart = startCursor || (ctx.currentTime + 0.05 + countInDuration);
    let cursor = playStart;
    const barStartTimes = [];

    audioSequences.forEach((seq, seqIdx) => {
      barStartTimes.push(cursor);
      if (!seq.notes.length) {
        const bpm = getBpm();
        const swing = isSwing();
        const barDuration = swing
          ? ((60/bpm)*(2/3) + (60/bpm)*(1/3)) * 4
          : (60/(bpm*2)) * 4;
        // Marcar número de compás aunque no haya notas
        const barDelay = Math.max(0, (cursor - ctx.currentTime) * 1000);
        const barT = setTimeout(() => highlightBarNum(seqIdx), barDelay);
        scheduledTimers.push(barT);
        cursor += barDuration;
        return;
      }
      const timings = getNoteTimings(seq.notes.length, cursor);
      const dir = seq.direction === 'down' ? 'down' : 'up';
      const startOct = getStartOctave(seq.notes, dir);
      const freqs = resolveFreqs(seq.notes, dir, startOct);

      seq.notes.forEach((note, i) => {
        const freq = freqs[i];
        if (!freq) return;
        const { startTime, duration } = timings[i];
        playTone(ctx, freq, startTime, duration);

        const onDelay  = (startTime - ctx.currentTime) * 1000;
        const offDelay = onDelay + duration * 1000;
        const onT  = setTimeout(() => highlightNote(seqIdx, i, true),  Math.max(0, onDelay));
        const offT = setTimeout(() => highlightNote(seqIdx, i, false), Math.max(0, offDelay));
        scheduledTimers.push(onT, offT);
      });

      cursor = timings[timings.length - 1].startTime + timings[timings.length - 1].duration;
    });

    if (isMetroEnabled()) scheduleMetronome(ctx, barStartTimes);

    
    const rows = Array.from(document.querySelectorAll('.bar-row'));
    if (rows.length > 0) {
      // Asegurar que el output es visible
      document.getElementById('output').style.display = '';
      // Mostrar primer grupo inmediatamente
      rows.forEach((r, i) => {
        r.style.display = i < 4 ? '' : 'none';
        r.style.opacity = '1';
      });
      // Programar grupos siguientes
      barStartTimes.forEach((t, i) => {
        if (i > 0 && i % 4 === 0) {
          const delay = Math.max(0, (t - ctx.currentTime) * 1000);
          const grp = i;
          const t1 = setTimeout(() => {
            lastVisibleGroup = grp;
            const r2 = Array.from(document.querySelectorAll('.bar-row'));
            r2.forEach((r, j) => {
              r.style.display = (j >= grp && j < grp + 4) ? '' : 'none';
              r.style.opacity = '1';
            });
          }, delay);
          scheduledTimers.push(t1);
        }
      });
    }

    const totalMs = (cursor - ctx.currentTime) * 1000 + 50;

    
    musicStartTime = playStart; // tiempo real de inicio (post countIn)
    startProgressBar(playStart, totalMs);

      if (isLoopEnabled()) {
      const loopT = setTimeout(() => {
        if (currentStop) playOnce(cursor);
      }, totalMs - 50);
      scheduledTimers.push(loopT);
    } else {
      
      const capturedGen = myGeneration;
      const endT = setTimeout(() => {
        if (playGeneration !== capturedGen) return; // ciclo invalidado — no tocar is-playing
        clearAllHighlights();
        if (btn) { btn.classList.remove('playing'); btn.textContent = '▶ Play'; }
        document.body.classList.remove('is-playing');
        document.getElementById('output').style.display = 'none';
        currentStop = null;
      }, totalMs + 1000);
      scheduledTimers.push(endT);
    }
  };

  currentStop = () => {
    scheduledTimers.forEach(clearTimeout);
    scheduledTimers = [];
    killAllOscillators();
    clearAllHighlights();
    if (btn) { btn.classList.remove('playing'); btn.textContent = '▶ Play'; }
    // Solo remover is-playing si somos el ciclo actual
    if (playGeneration === myGeneration) {
      document.body.classList.remove('is-playing');
    }
    currentStop = null;
  };

  playOnce();
}

let playStartTime = 0;
let totalPlayDuration = 0;
let progressTimer = null;
let pausedAtSec = 0;
let isPaused = false;
let isPlayingNow = false;

function startProgressBar(ctxStartTime, totalMs) {
  playStartTime = ctxStartTime;
  musicStartTime = ctxStartTime; // tiempo real de inicio de música
  totalPlayDuration = totalMs / 1000;
  const fill = document.getElementById('progress-bar-fill');
  if (!fill) return;
  fill.style.width = '0%';
  if (progressTimer) clearInterval(progressTimer);
  progressTimer = setInterval(() => {
    const ctx = getAudioCtx();
    const elapsedSec = ctx.currentTime - playStartTime;
    const pct = Math.min(1, elapsedSec / totalPlayDuration) * 100;
    fill.style.width = pct + '%';
  }, 100);
}

function stopProgressBar() {
  if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
  const fill = document.getElementById('progress-bar-fill');
  if (fill) fill.style.width = '0%';
}

function formatTime(sec) {
  const s = Math.max(0, Math.floor(sec));
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

let isScrubbing = false;
let musicStartTime = 0;

function playAllFrom(seekSec) {
  // AUDIO GATE: único punto de control — evita re-entradas
  if (!audioSequences.length) return;
  const fromGen = ++playGeneration;
  const ctx = getAudioCtx();
  const playStart = ctx.currentTime + 0.05;
  let cursor = playStart;
  const barStartTimes = [];
  const bpm = getBpm();
  const swing = isSwing();
  const barDuration = swing
    ? ((60/bpm)*(2/3) + (60/bpm)*(1/3)) * 4
    : (60/(bpm*2)) * 4;

  let startBarIdx = 0;
  let timeAcc = 0;
  for (let i = 0; i < audioSequences.length; i++) {
    if (timeAcc + barDuration > seekSec) { startBarIdx = i; break; }
    timeAcc += barDuration;
    if (i === audioSequences.length - 1) startBarIdx = i;
  }
  lastVisibleGroup = Math.floor(startBarIdx / 4) * 4;

  audioSequences.slice(startBarIdx).forEach((seq, relIdx) => {
    const absIdx = startBarIdx + relIdx;
    barStartTimes.push(cursor);
    if (!seq.notes.length) { cursor += barDuration; return; }
    const timings = getNoteTimings(seq.notes.length, cursor);
    const dir = seq.direction === 'down' ? 'down' : 'up';
    const startOct = getStartOctave(seq.notes, dir);
    const freqs = resolveFreqs(seq.notes, dir, startOct);
    seq.notes.forEach((note, i) => {
      const freq = freqs[i];
      if (!freq) return;
      const { startTime, duration } = timings[i];
      playTone(ctx, freq, startTime, duration);
      const onDelay  = (startTime - ctx.currentTime) * 1000;
      const offDelay = onDelay + duration * 1000;
      const onT  = setTimeout(() => highlightNote(absIdx, i, true),  Math.max(0, onDelay));
      const offT = setTimeout(() => highlightNote(absIdx, i, false), Math.max(0, offDelay));
      scheduledTimers.push(onT, offT);
    });
    cursor = timings[timings.length - 1].startTime + timings[timings.length - 1].duration;
  });

  // Calcular totalMs de toda la progresión (no solo del fragmento)
  const fullTotalMs = totalPlayDuration > 0
    ? totalPlayDuration * 1000
    : (cursor - ctx.currentTime) * 1000 + seekSec * 1000;
  startProgressBar(playStart - seekSec, fullTotalMs);

  const rows = Array.from(document.querySelectorAll('.bar-row'));
  if (rows.length > 0) {
    document.getElementById('output').style.display = '';
    rows.forEach((r, j) => r.style.display = (j >= lastVisibleGroup && j < lastVisibleGroup + 4) ? '' : 'none');
    barStartTimes.forEach((t, i) => {
      const absI = startBarIdx + i;
      if (absI > 0 && absI % 4 === 0) {
        const grp = Math.floor(absI / 4) * 4;
        const delay = Math.max(0, (t - ctx.currentTime) * 1000);
        const t1 = setTimeout(() => {
          lastVisibleGroup = grp;
          const r2 = Array.from(document.querySelectorAll('.bar-row'));
          r2.forEach((r, j) => r.style.display = (j >= grp && j < grp + 4) ? '' : 'none');
        }, delay);
        scheduledTimers.push(t1);
      }
    });
  }

  if (isMetroEnabled()) scheduleMetronome(ctx, barStartTimes, true);

  const totalMs = (cursor - ctx.currentTime) * 1000 + 50;
  const btn = document.getElementById('btn-play-all');
  const capturedFromGen = playGeneration;
  // Loop A-B tiene prioridad sobre loop global
  if (isLoopEnabled()) {
    const loopT = setTimeout(() => { if (currentStop && playGeneration === capturedFromGen) playAllFrom(0); }, totalMs - 50);
    scheduledTimers.push(loopT);
  } else {
    const endT = setTimeout(() => {
      if (playGeneration !== capturedFromGen) return;
      clearAllHighlights();
      if (btn) { btn.classList.remove('playing'); btn.textContent = '▶ Play'; }
      document.body.classList.remove('is-playing');
      document.getElementById('output').style.display = 'none';
      stopProgressBar();
      currentStop = null;
    }, totalMs + 1000);
    scheduledTimers.push(endT);
  }

  currentStop = () => {
    scheduledTimers.forEach(clearTimeout);
    scheduledTimers = [];
    killAllOscillators();
    clearAllHighlights();
    if (btn) { btn.classList.remove('playing'); btn.textContent = '▶ Play'; }
    if (playGeneration === capturedFromGen) document.body.classList.remove('is-playing');
    stopProgressBar();
    currentStop = null;
  };
}

function exitPlay() {
  isPlayingNow = false;
  isPaused = false;
  pausedAtSec = 0;

  clearAllHighlights();
  currentStop = null;
  stopProgressBar();
  document.body.classList.remove('is-playing');

  document.getElementById('output').innerHTML = '';
  audioSequences = [];
  clearLoopAB();
  document.getElementById('top-controls').classList.remove('visible');

let toggleDebounce = false;
function togglePlayPause() {
  if (toggleDebounce) return;
  toggleDebounce = true;
  setTimeout(() => { toggleDebounce = false; }, 400);

  if (isPaused) {
    isPaused = false;
    isPlayingNow = true;
    updatePlayBtn(true);
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') {
      ctx.resume().then(() => playAllFrom(pausedAtSec));
    } else {
      playAllFrom(pausedAtSec);
    }
  } else {
    if (totalPlayDuration > 0) {
      const elapsed = getAudioCtx().currentTime - musicStartTime;
      pausedAtSec = Math.max(0, Math.min(elapsed, totalPlayDuration));
    }
    isPaused = true;
    isPlayingNow = false;
    scheduledTimers.forEach(clearTimeout);
    scheduledTimers = [];
    killAllOscillators();
    clearAllHighlights();
    if (currentStop) { currentStop = null; }
    stopProgressBar();
    updatePlayBtn(false);
    const rows = Array.from(document.querySelectorAll('.bar-row'));
    rows.forEach((r, j) => r.style.display = (j >= lastVisibleGroup && j < lastVisibleGroup + 4) ? '' : 'none');
  }
}

// ── LOOP A–B ──────────────────────────────────────────────────────────────────
let loopA = null; // segundos
let loopB = null; // segundos
let loopABEnabled = false;
let abClickCount = 0; // 0=ninguno, 1=A seteado, 2=A+B seteados

function scrubClick(e) {
  if (!totalPlayDuration) return;
  const pct = getScrubPct(e);
  const seekSec = pct * totalPlayDuration;
  doSeek(seekSec);
}

function updateLoopMarkers() {
  const markerA = document.getElementById('loop-marker-a');
  const markerB = document.getElementById('loop-marker-b');
  const range   = document.getElementById('loop-range');
  if (!markerA || !markerB || !range || !totalPlayDuration) return;

  if (loopA !== null) {
    const pctA = (loopA / totalPlayDuration) * 100;
    markerA.style.display = '';
    markerA.style.left = pctA + '%';
  } else {
    markerA.style.display = 'none';
  }

  if (loopB !== null) {
    const pctB = (loopB / totalPlayDuration) * 100;
    markerB.style.display = '';
    markerB.style.left = pctB + '%';
    // Zona A-B highlight
    const pctA = (loopA / totalPlayDuration) * 100;
    range.style.display = '';
    range.style.left  = pctA + '%';
    range.style.width = (pctB - pctA) + '%';
  } else {
    markerB.style.display = 'none';
    range.style.display = 'none';
  }
}

function clearLoopAB() {
  loopA = null; loopB = null;
  loopABEnabled = false; abClickCount = 0;
  updateLoopMarkers();
}

// ── TIMELINE SCRUBBER ─────────────────────────────────────────────────────────
function getScrubPct(e) {
  const track = document.getElementById('progress-bar-track');
  if (!track) return 0;
  const rect = track.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
}

function doSeek(seekSec) {
  scheduledTimers.forEach(clearTimeout);
  scheduledTimers = [];
  killAllOscillators();
  clearAllHighlights();
  currentStop = null;
  pausedAtSec = seekSec;
  isPaused = false;
  isPlayingNow = true;
  updatePlayBtn(true);
  playAllFrom(seekSec);
}

function getBarDurationSec() {
  const bpm = getBpm();
  return isSwing()
    ? ((60/bpm)*(2/3) + (60/bpm)*(1/3)) * 4
    : (60/(bpm*2)) * 4;
}

function rewind() {
  const N = getBarDurationSec() * 2; // 2 compases atrás
  const seekSec = Math.max(0, pausedAtSec - N);
  // Limpiar audio actual
  scheduledTimers.forEach(clearTimeout);
  scheduledTimers = [];
  killAllOscillators();
  clearAllHighlights();
  currentStop = null;
  // Reanudar desde nueva posición
  pausedAtSec = seekSec;
  isPaused = false;
  isPlayingNow = true;
  updatePlayBtn(true);
  playAllFrom(seekSec);
}

function fastForward() {
  const N = getBarDurationSec() * 2; // 2 compases adelante
  const seekSec = Math.min(totalPlayDuration, pausedAtSec + N);
  // Limpiar audio actual
  scheduledTimers.forEach(clearTimeout);
  scheduledTimers = [];
  killAllOscillators();
  clearAllHighlights();
  currentStop = null;
  // Reanudar desde nueva posición
  pausedAtSec = seekSec;
  isPaused = false;
  isPlayingNow = true;
  updatePlayBtn(true);
  playAllFrom(seekSec);
}

function restartPlay() {
  scheduledTimers.forEach(clearTimeout);
  scheduledTimers = [];
  killAllOscillators();
  clearAllHighlights();
  currentStop = null;
  document.querySelectorAll('.btn-play-bar').forEach(b => b.classList.remove('playing'));
  isPaused = false;
  pausedAtSec = 0;
  isPlayingNow = false;
  musicStartTime = 0;
  playStartTime = 0;
  totalPlayDuration = 0;
  lastVisibleGroup = 0;
  stopProgressBar();
  document.body.classList.add('is-playing');
  document.getElementById('output').style.display = '';
  const ppBtn = document.getElementById('btn-play-pause');
  updatePlayBtn(true);
  playAll(true);
}


function isMetroEnabled() {
  const el = document.getElementById('metro-chk');
  return el ? el.checked : false;
}

function playTick() {
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    osc.connect(env);
    env.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = 1800;
    env.gain.setValueAtTime(0.15, now);
    env.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    osc.start(now);
    osc.stop(now + 0.07);
  } catch(e) {}
}

function playTickPlay() {
  // Play: dos notas graves ascendentes — tipo "launch"
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    [330, 495].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const env = ctx.createGain();
      osc.connect(env);
      env.connect(ctx.destination);
      osc.type = 'triangle';
      osc.frequency.value = freq;
      const t = now + i * 0.07;
      env.gain.setValueAtTime(0.2, t);
      env.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc.start(t);
      osc.stop(t + 0.12);
    });
  } catch(e) {}
}

function playTickClear() {
  // Woosh descendente
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    const bufferSize = ctx.sampleRate * 0.25;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.setValueAtTime(800, now);
    filter.frequency.exponentialRampToValueAtTime(80, now + 0.22);
    filter.Q.value = 0.8;
    const env = ctx.createGain();
    env.gain.setValueAtTime(0.25, now);
    env.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
    noise.connect(filter);
    filter.connect(env);
    env.connect(ctx.destination);
    noise.start(now);
    noise.stop(now + 0.25);
  } catch(e) {}
}

function playTickSelect() {
  // Sonido de selección: dos notas ascendentes
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const now = ctx.currentTime;
    [660, 990].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const env = ctx.createGain();
      osc.connect(env);
      env.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = now + i * 0.08;
      env.gain.setValueAtTime(0.18, t);
      env.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      osc.start(t);
      osc.stop(t + 0.09);
    });
  } catch(e) {}
}

function playClick(ctx, startTime, accent) {
  const osc = ctx.createOscillator();
  const env = ctx.createGain();
  osc.connect(env);
  env.connect(ctx.destination);
  osc.type = 'square';
  osc.frequency.value = accent ? 1200 : 900;
  env.gain.setValueAtTime(accent ? 0.3 : 0.15, startTime);
  env.gain.exponentialRampToValueAtTime(0.001, startTime + 0.04);
  osc.start(startTime);
  osc.stop(startTime + 0.05);
  activeOscillators.push({ osc, env });
  osc.onended = () => {
    activeOscillators = activeOscillators.filter(o => o.osc !== osc);
  };
}

function playCountIn(ctx, startTime) {
  if (startTime <= ctx.currentTime) return;
  const osc = ctx.createOscillator();
  const env = ctx.createGain();
  osc.connect(env);
  env.connect(ctx.destination);
  osc.type = 'triangle';
  osc.frequency.value = 660;
  env.gain.setValueAtTime(0.2, startTime);
  env.gain.exponentialRampToValueAtTime(0.001, startTime + 0.08);
  osc.start(startTime);
  osc.stop(startTime + 0.09);
  activeOscillators.push({ osc, env });
  osc.onended = () => { activeOscillators = activeOscillators.filter(o => o.osc !== osc); };
}

function scheduleMetronome(ctx, barStartTimes, noCountIn = false) {
  if (!barStartTimes.length) return;
  const t0 = barStartTimes[0];
  const barDuration = barStartTimes.length > 1
    ? barStartTimes[1] - barStartTimes[0]
    : (60 / getBpm()) * 4;
  const countInAudible = !noCountIn && (document.getElementById('countin-chk')?.checked ?? true);
  if (countInAudible) {
    // CountIn con Web Audio para precisión
    playCountIn(ctx, t0 - barDuration * 0.5);
    playCountIn(ctx, t0 - barDuration * 0.25);
  }
  // Metrónomo con Web Audio API (sample-accurate)
  barStartTimes.forEach(t => playClick(ctx, t, true));
}

  let bars = [];

function generateABC(withDir) {
  if (!withDir || !withDir.length) return '';

  
  
  
  const semitoneToABC = (semi, octave) => {
    const names = ['C','D','E','F','G','A','B'];
    const accs =  ['' ,'' ,'' ,'' ,'' ,'' ,'' ];
    
    const noteMap = [
      'C', '^C', 'D', '_E', 'E', 'F', '^F', 'G', '_A', 'A', '_B', 'B'
    ];
    const noteName = noteMap[semi % 12];
    
    if (octave === 3) return noteName + ',';
    if (octave === 4) return noteName;
    if (octave === 5) return noteName.replace(/^([_^]?)(.*)/, (_, acc, n) => acc + n.toLowerCase());
    if (octave === 6) return noteName.replace(/^([_^]?)(.*)/, (_, acc, n) => acc + n.toLowerCase()) + "'";
    return noteName;
  };

  
  const toSemi = n => NOTE_SEMITONE[n] !== undefined ? NOTE_SEMITONE[n] : -1;

  
  const placeNotes = (displayNotes, direction) => {
    if (!displayNotes || !displayNotes.length) return ['z'];
    const semis = displayNotes.map(toSemi).filter(s => s >= 0);
    if (!semis.length) return ['z'];

    const result = [];
    
    let oct = direction === 'down' ? 5 : 4;
    let prevSemi = semis[0];

    semis.forEach((semi, i) => {
      if (i === 0) {
        result.push(semitoneToABC(semi, oct));
        prevSemi = semi;
        return;
      }
      const diff = semi - prevSemi;
      if (direction === 'up') {
        if (diff < 0) oct++;
      } else {
        if (diff > 0) oct--;
      }
      
      oct = Math.max(4, Math.min(5, oct));
      result.push(semitoneToABC(semi, oct));
      prevSemi = semi;
    });
    return result;
  };

  let abc = 'X:1\nT:Barry Harris\nM:4/4\nL:1/8\nK:C\n%%staffwidth 680\n%%scale 1.4\n%%gchordfont Helvetica 11\n%%annotationfont Helvetica 9\n';

  withDir.forEach((r, i) => {
    const chordName = (r.original || '').replace(/"/g, '').replace(/[^\w\s#b+\-]/g, '').trim();
    const scaleName = (r.scaleName || '').replace(/"/g, '').replace(/[^\w\s#b+\-→()]/g, '').trim();
    const dir = r.direction === 'up' ? '↑' : r.direction === 'down' ? '↓' : '';

    
    const chordLabel = chordName ? `"${chordName} ${dir}"` : '';
    const scaleLabel = scaleName ? `"_${scaleName}"` : '';

    if (!r.displayNotes || !r.displayNotes.length || r.scaleType === 'ref') {
      abc += `${chordLabel}${scaleLabel} z8 |`;
    } else {
      const notes = placeNotes(r.displayNotes, r.direction);
      const count = notes.length;
      const pad = count < 8 ? Array(8 - count).fill('z').join('') : '';
      abc += `${chordLabel}${scaleLabel} ${notes.join('')}${pad} |`;
    }

    if ((i + 1) % 4 === 0) abc += '\n';
  });

  return abc + '\n';
}

let transposeState = { semitones: 0, originalRaw: '' };

const FLAT_KEYS = new Set(['F','Bb','Eb','Ab','Db','Gb']);

function preferFlat(idx) {
  
  const flat = NOTES_FLAT[idx];
  const sharp = NOTES_SHARP[idx];
  
  return flat;
}

function transposeChordString(raw, semitones) {
  if (semitones === 0) return raw;
  const match = raw.trim().match(/^([A-G][b#]?)(.*)/);
  if (!match) return raw;
  const rootRaw = match[1];
  const quality = match[2];
  const norm = ENHARMONICS[rootRaw] || rootRaw;
  const idx = NOTES_SHARP.indexOf(norm);
  if (idx === -1) return raw;
  const newIdx = ((idx + semitones) % 12 + 12) % 12;

  
  const originalWasFlat = rootRaw.includes('b');
  const sharp = NOTES_SHARP[newIdx];
  const flat = NOTES_FLAT[newIdx];
  
  let newRoot;
  if (sharp === flat) {
    newRoot = sharp;
  } else if (originalWasFlat) {
    newRoot = flat;
  } else {
    
    newRoot = flat.includes('b') ? flat : sharp;
  }
  return newRoot + quality;
}

function transposeProgression(raw, semitones) {
  if (semitones === 0) return raw;
  
  return raw.replace(/([A-G][b#]?[^\s\/|]*)/g, m => transposeChordString(m, semitones));
}

function stepTranspose(delta) {
  playTick();
  transposeState.semitones = ((transposeState.semitones + delta + 12) % 24) - 12;
  
  if (transposeState.semitones > 11) transposeState.semitones -= 12;
  if (transposeState.semitones < -11) transposeState.semitones += 12;
  document.getElementById('semitone-val').textContent =
    (transposeState.semitones > 0 ? '+' : '') + transposeState.semitones;
  document.getElementById('target-key').value = '';
  updateTransposePreview();
}

function setTargetKey(targetNote) {
  if (!targetNote) return;
  const raw = transposeState.originalRaw;
  
  const match = raw.match(/([A-G][b#]?)/);
  if (!match) return;
  const firstRoot = match[1];
  const norm = ENHARMONICS[firstRoot] || firstRoot;
  const fromIdx = NOTES_SHARP.indexOf(norm);
  const toNorm = ENHARMONICS[targetNote] || targetNote;
  const toIdx = NOTES_SHARP.indexOf(toNorm);
  if (fromIdx === -1 || toIdx === -1) return;
  let semitones = (toIdx - fromIdx + 12) % 12;
  if (semitones > 6) semitones -= 12; 
  transposeState.semitones = semitones;
  document.getElementById('semitone-val').textContent =
    (semitones > 0 ? '+' : '') + semitones;
  updateTransposePreview();
}

function updateTransposePreview() {
  const preview = document.getElementById('transpose-preview');
  const transposed = transposeProgression(transposeState.originalRaw, transposeState.semitones);
  if (transposeState.semitones === 0) {

function updateCleanPreview() {
  const raw = document.getElementById('input')?.value || '';
  const preview = document.getElementById('clean-preview');
  const previewText = document.getElementById('clean-preview-text');
  if (!preview || !previewText) return;
  if (!raw.trim()) { preview.classList.remove('visible'); return; }
  // Obtener progresión limpia
  const step1 = sanitizeProgression(raw);
  const parts = step1.split(/(\s*\/\s*)/);
  const cleaned = parts.map(part => {
    if (/^\s*\/\s*$/.test(part)) return part;
    const tokens = part.trim().split(/\s+/);
    const valid = tokens.filter(t => t && parseChord(t));
    return valid.join(' ');
  }).join('');
  const result = cleaned
    .replace(/(\s*\/\s*){2,}/g, ' / ')
    .replace(/^\s*\/\s*/, '')
    .replace(/\s*\/\s*$/, '')
    .trim();
  if (!result) { preview.classList.remove('visible'); return; }
  // Solo mostrar si hay diferencia con el input
  if (result === raw.trim()) {
    preview.classList.remove('visible');
  } else {
    previewText.textContent = result;
    preview.classList.add('visible');
  }
}

function sanitizeChords() {
  const input = document.getElementById('input');
  if (!input) return;
  const raw = input.value;
  if (!raw.trim()) return;
  // Paso 1: sanitizeProgression limpia formato
  const step1 = sanitizeProgression(raw);
  // Paso 2: filtrar tokens que parseChord no reconoce
  const parts = step1.split(/(\s*\/\s*)/);
  const cleaned = parts.map(part => {
    if (/^\s*\/\s*$/.test(part)) return part;
    const tokens = part.trim().split(/\s+/);
    const valid = tokens.filter(t => t && parseChord(t));
    return valid.join(' ');
  }).join('');
  const result = cleaned
    .replace(/(\s*\/\s*){2,}/g, ' / ')
    .replace(/^\s*\/\s*/, '')
    .replace(/\s*\/\s*$/, '')
    .trim();
  const changed = result !== raw.trim();
  if (!changed) return;
  input.value = result;
  // iOS Safari trick: scroll fuerza refresco visual
  input.scrollTop = 0;
  input.scrollTop = input.scrollHeight;
  audioSequences = [];
  checkPlayBtn();
  showToast('Tokens inválidos eliminados');
}

// Swipe para borrar
let swipeStartX = 0;
let swipeThreshold = 60;

function libSwipeStart(e, el) {
  swipeStartX = e.touches[0].clientX;
  el.style.transition = 'none';
}

function libSwipeMove(e, el) {
  const dx = e.touches[0].clientX - swipeStartX;
  if (dx < 0) {
    el.style.transform = `translateX(${Math.max(dx, -72)}px)`;
  } else if (el.classList.contains('swiped')) {
    el.style.transform = `translateX(${Math.min(dx - 72, 0)}px)`;
  }
}

function libSwipeEnd(e, el, name) {
  el.style.transition = 'transform 0.2s ease';
  const dx = e.changedTouches[0].clientX - swipeStartX;
  if (dx < -swipeThreshold) {
    el.classList.add('swiped');
    el.style.transform = 'translateX(-72px)';
  } else {
    el.classList.remove('swiped');
    el.style.transform = 'translateX(0)';
  }
}

  const btn = document.getElementById('btn-input-mode');
  if (btn) {
    if (inputModeVisual) {
      btn.textContent = '📝';
      btn.style.color = 'var(--amber)';
      btn.style.borderColor = 'var(--amber)';
    } else {
      btn.textContent = '📝';
      btn.style.color = '';
      btn.style.borderColor = '';
    }
  }
}

function checkPlayBtn() {
  const val = document.getElementById('input') ? document.getElementById('input').value.trim() : '';
  const btn = document.querySelector('.btn-play-all');
  if (!btn) return;
  if (!val) { btn.disabled = true; return; }
  // Verificar que haya al menos un acorde reconocible
  const tokens = val.split(/[\s\/|]+/).filter(t => t.trim());
  const hasValid = tokens.some(t => parseChord(t));
  btn.disabled = !hasValid;
}

document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('input');
  
  // Limpiar todo al inicio
  audioSequences = [];
  isPlayingNow = false;
  isPaused = false;
  pausedAtSec = 0;
  lastVisibleGroup = 0;
  document.getElementById('output').innerHTML = '';
  document.getElementById('output').style.display = 'none';
  document.body.classList.remove('is-playing');

  const DEFAULT_PROG = 'Am7 / D7 / Gmaj7 / Cmaj7 / F#m7b5 / B7 / Em7 / Em7 / Am7 / D7 / Gmaj7 / Cmaj7 / F#m7b5 / B7 / Em7 / Em7 / F#m7b5 / B7 / Em7 / Em7 / Am7 / D7 / Gmaj7 / Gmaj7 / F#m7b5 / B7 / Em7 / Em7 / F#m7b5 / B7 / Em7 C7 / B7 / Em7 / Gmaj7';
  try { localStorage.removeItem('improver_last_prog'); } catch(e) {}
  input.value = DEFAULT_PROG;
  currentProgName = 'Autumn Leaves';
  checkPlayBtn();
  libraryRender();
  // Marcar botón activo del standard cargado por defecto
  document.querySelectorAll('.ex-btn').forEach(b => {
    if (b.textContent.trim().toUpperCase() === 'AUTUMN LEAVES') b.classList.add('active');
  });
  

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) analyze();
  });
  input.addEventListener('input', () => {
    audioSequences = [];
    document.getElementById('output').innerHTML = '';
    document.getElementById('output').style.display = 'none';
    currentProgName = '';
    setTimeout(checkPlayBtn, 0);
  });
  input.addEventListener('paste', () => {
    setTimeout(sanitizeAndShow, 10);
  });
  document.getElementById('swing-chk').addEventListener('change', function() {
    document.getElementById('swing-label').textContent = this.checked ? 'Swing' : 'Recto';
  });
});</script>

<!-- Controles flotantes Play/Stop durante reproducción -->
<div class="float-controls" id="float-controls">
  <button class="float-btn" onclick="restartPlay()" title="Inicio"><svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><rect x="2" y="2" width="3" height="14" rx="1"/><polygon points="6,9 16,3 16,15"/></svg></button>
  <button class="float-btn" id="btn-play-pause" onclick="togglePlayPause()" title="Play/Pausa"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><polygon points="3,1 13,8 3,15"/></svg></button>
  <button class="float-btn stop-btn" onclick="exitPlay()" title="Salir"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><polygon points="8,2 14,10 2,10"/><rect x="2" y="12" width="12" height="2" rx="1"/></svg></button>
</div>

<script src="chordPicker.js"></script>
</body>
