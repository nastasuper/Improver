    if (direction === 'up') {
      if (semi <= prevSemi) oct++;
    } else {
      // Descending: next should be lower
      // Exception: chromatic half-step up (1 semitone) = passing tone, keep octave
      const stepUp = ((semi - prevSemi) + 12) % 12;
      if (stepUp === 1) {
        // half-step up chromatic passing note — stay in same octave
      } else if (semi >= prevSemi) {
        oct--;
      }
    }
    freqs.push(noteFreq(notes[i], oct));
    prevSemi = semi;
  }
  return freqs;
}

let activeOscillators = [];

function playTone(ctx, freq, startTime, duration) {
  // Piano synthesis: additive harmonics + ADSR envelope
  // Harmonic series with natural decay rates
  const harmonics = [
    { ratio: 1,    gain: 0.6,  detune: 0    },
    { ratio: 2,    gain: 0.25, detune: 1.2  },
    { ratio: 3,    gain: 0.12, detune: -0.8 },
    { ratio: 4,    gain: 0.07, detune: 1.5  },
    { ratio: 5,    gain: 0.04, detune: -1.0 },
    { ratio: 6,    gain: 0.02, detune: 0.5  },
  ];

  // Master output with low-pass filter (piano loses highs over time)
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = Math.min(freq * 12, 8000);
  filter.Q.value = 0.5;
  filter.connect(ctx.destination);

  // Decay time: lower notes decay slower (like a real piano)
  const decayTime = Math.min(duration + 1.5, 4.0) * (1 + (300 / Math.max(freq, 100)));
  const normDecay = Math.min(decayTime, 5.0);

  harmonics.forEach(h => {
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    osc.connect(env);
    env.connect(filter);

    osc.type = 'sine';
    osc.frequency.value = freq * h.ratio;
    osc.detune.value = h.detune;

    // ADSR: fast attack, exponential decay, no sustain, short release
    const attack = 0.004;
    const peakGain = h.gain * 0.35;
    const sustainLevel = peakGain * 0.05;

    env.gain.setValueAtTime(0, startTime);
    env.gain.linearRampToValueAtTime(peakGain, startTime + attack);
    env.gain.exponentialRampToValueAtTime(
      Math.max(sustainLevel, 0.0001),
      startTime + attack + normDecay * (1 / h.ratio) // higher harmonics decay faster
    );
    env.gain.exponentialRampToValueAtTime(0.0001, startTime + duration + 0.3);

    osc.start(startTime);
    osc.stop(startTime + duration + 0.4);

    activeOscillators.push({ osc, env });
    osc.onended = () => {
      activeOscillators = activeOscillators.filter(o => o.osc !== osc);
    };
  });
}

function killAllOscillators() {
  const now = audioCtx ? audioCtx.currentTime : 0;
  activeOscillators.forEach(({ osc, env }) => {
    try {
      env.gain.cancelScheduledValues(now);
      env.gain.setValueAtTime(0, now);
      osc.stop(now);
    } catch(e) {}
  });
  activeOscillators = [];
}

function getBpm() {
  return parseInt(document.getElementById('bpm-slider').value, 10);
}

function isSwing() {
  return document.getElementById('swing-chk').checked;
}

// Returns array of {startTime, duration} for each note in the sequence
function getNoteTimings(noteCount, startTime, fillBar) {
  const bpm = getBpm();
  const swing = isSwing();
  const eighthStraight = 60 / (bpm * 2);
  const swingLong  = (60 / bpm) * (2/3);
  const swingShort = (60 / bpm) * (1/3);
  const beatDuration = 60 / bpm;
  const barDuration = beatDuration * 4; // full 4-beat bar

  const timings = [];
  let t = startTime;
  for (let i = 0; i < noteCount; i++) {
    const isLast = i === noteCount - 1;
    const isOddCount = noteCount % 2 === 1;
    let dur;
    if (isLast && fillBar) {
      // Extend last note to fill remainder of 4-beat bar
      const barEnd = startTime + barDuration;
      dur = Math.max(barEnd - t, swingLong);
    } else if (isLast && isOddCount) {
      dur = swing ? swingLong + swingShort : eighthStraight * 2;
    } else if (!swing) {
      dur = eighthStraight;
    } else {
      dur = (i % 2 === 0) ? swingLong : swingShort;
    }
    timings.push({ startTime: t, duration: dur });
    t += dur;
  }
  return timings;
}

function highlightNote(seqIdx, noteIdx, active) {
  document.querySelectorAll(`.note[data-seq="${seqIdx}"][data-ni="${noteIdx}"]`).forEach(el => {
    if (active) el.classList.add('active');
    else el.classList.remove('active');
  });
}

function clearAllHighlights() {
  document.querySelectorAll('.note.active').forEach(el => el.classList.remove('active'));
}

function stopAll() {
  if (currentStop) { currentStop(); currentStop = null; }
  killAllOscillators();
  clearAllHighlights();
  document.querySelectorAll('.btn-play-bar').forEach(b => b.classList.remove('playing'));
  const pa = document.getElementById('btn-play-all');
  if (pa) { pa.classList.remove('playing'); pa.textContent = '▶ Play'; }
  document.body.classList.remove('is-playing');
}

function playSequence(seqIdx, btn) {
  stopAll();
  const seq = audioSequences[seqIdx];
  if (!seq || !seq.notes.length) return;

  const ctx = getAudioCtx();
  const now = ctx.currentTime + 0.05;
  const timings = getNoteTimings(seq.notes.length, now);
  const dir = seq.direction === 'down' ? 'down' : 'up';
  const startOct = getStartOctave(seq.notes, dir);
  const freqs = resolveFreqs(seq.notes, dir, startOct);

  seq.notes.forEach((note, i) => {
    const freq = freqs[i];
    if (!freq) return;
    const { startTime, duration } = timings[i];
    playTone(ctx, freq, startTime, duration);

    const onDelay = (startTime - ctx.currentTime) * 1000;
    const offDelay = onDelay + duration * 1000;
    const onT = setTimeout(() => highlightNote(seqIdx, i, true), Math.max(0, onDelay));
    const offT = setTimeout(() => highlightNote(seqIdx, i, false), Math.max(0, offDelay));
    scheduledTimers.push(onT, offT);
  });

  if (btn) btn.classList.add('playing');
  const endTime = timings[timings.length - 1].startTime + timings[timings.length - 1].duration;
  const totalDuration = endTime - now;

  // Schedule metronome if enabled
  if (isMetroEnabled()) scheduleMetronome(ctx, [now]);

  const endT = setTimeout(() => {
    clearAllHighlights();
    if (btn) btn.classList.remove('playing');
  }, totalDuration * 1000 + 100);
  scheduledTimers.push(endT);

  currentStop = () => { scheduledTimers.forEach(clearTimeout); scheduledTimers = []; };
}

let scheduledTimers = [];

function isLoopEnabled() {
  const el = document.getElementById('loop-chk');
  return el ? el.checked : false;
}

function playAll() {
  if (!audioSequences.length) return;
  stopAll();
  document.body.classList.add('is-playing');

  const btn = document.getElementById('btn-play-all');
  if (btn) { btn.classList.add('playing'); btn.textContent = '■ Tocando...'; }

  const ctx = getAudioCtx();

  const playOnce = (startCursor) => {
    const playStart = startCursor || (ctx.currentTime + 0.05);
    let cursor = playStart;
    const barStartTimes = [];

    audioSequences.forEach((seq, seqIdx) => {
      barStartTimes.push(cursor);
      if (!seq.notes.length) {
        const bpm = getBpm();
        const swing = isSwing();
        const barDuration = swing
          ? ((60/bpm)*(2/3) + (60/bpm)*(1/3)) * 4
          : (60/(bpm*2)) * 4;
        cursor += barDuration;
        return;
      }
      const timings = getNoteTimings(seq.notes.length, cursor);
      const dir = seq.direction === 'down' ? 'down' : 'up';
      const startOct = getStartOctave(seq.notes, dir);
      const freqs = resolveFreqs(seq.notes, dir, startOct);

      seq.notes.forEach((note, i) => {
        const freq = freqs[i];
        if (!freq) return;
        const { startTime, duration } = timings[i];
        playTone(ctx, freq, startTime, duration);

        const onDelay  = (startTime - ctx.currentTime) * 1000;
        const offDelay = onDelay + duration * 1000;
        const onT  = setTimeout(() => highlightNote(seqIdx, i, true),  Math.max(0, onDelay));
        const offT = setTimeout(() => highlightNote(seqIdx, i, false), Math.max(0, offDelay));
        scheduledTimers.push(onT, offT);
      });

      cursor = timings[timings.length - 1].startTime + timings[timings.length - 1].duration;
    });

    if (isMetroEnabled()) scheduleMetronome(ctx, barStartTimes);

    const totalMs = (cursor - ctx.currentTime) * 1000 + 50;

    if (isLoopEnabled()) {
      const loopT = setTimeout(() => {
        if (currentStop) playOnce(cursor);
      }, totalMs - 50);
      scheduledTimers.push(loopT);
    } else {
      const endT = setTimeout(() => {
        clearAllHighlights();
        if (btn) { btn.classList.remove('playing'); btn.textContent = '▶ Play'; }
        document.body.classList.remove('is-playing');
        currentStop = null;
      }, totalMs);
      scheduledTimers.push(endT);
    }
  };

  currentStop = () => {
    scheduledTimers.forEach(clearTimeout);
    scheduledTimers = [];
    killAllOscillators();
    clearAllHighlights();
    if (btn) { btn.classList.remove('playing'); btn.textContent = '▶ Play'; }
    document.body.classList.remove('is-playing');
    currentStop = null;
  };

  playOnce();
}

function isMetroEnabled() {
  const el = document.getElementById('metro-chk');
  return el ? el.checked : false;
}

// Play a metronome click (short high-pitched tick)
function playClick(ctx, startTime, accent) {
  const osc = ctx.createOscillator();
  const env = ctx.createGain();
  osc.connect(env);
  env.connect(ctx.destination);
  osc.type = 'square';
  osc.frequency.value = accent ? 1200 : 900;
  env.gain.setValueAtTime(accent ? 0.3 : 0.15, startTime);
  env.gain.exponentialRampToValueAtTime(0.001, startTime + 0.04);
  osc.start(startTime);
  osc.stop(startTime + 0.05);
  activeOscillators.push({ osc, env });
  osc.onended = () => {
    activeOscillators = activeOscillators.filter(o => o.osc !== osc);
  };
}

// Schedule metronome: one click per bar start
function scheduleMetronome(ctx, barStartTimes) {
  barStartTimes.forEach((t, i) => {
    playClick(ctx, t, true); // all clicks accented (= beat 1 of each bar)
  });
}

// ─── ABC NOTATION & PENTAGRAMA ────────────────────────────────────────────────

function generateABC(withDir) {
  if (!withDir || !withDir.length) return '';

  // ABC note names with octave — range C3 to B4 (two octaves)
  // ABC: C, = C3, C = C4, c = C5
  // We use C, to B (C3 to B4) = two octaves
  const semitoneToABC = (semi, octave) => {
    const names = ['C','D','E','F','G','A','B'];
    const accs =  ['' ,'' ,'' ,'' ,'' ,'' ,'' ];
    // Map semitone to note
    const noteMap = [
      'C', '^C', 'D', '_E', 'E', 'F', '^F', 'G', '_A', 'A', '_B', 'B'
    ];
    const noteName = noteMap[semi % 12];
    // Octave adjustment for ABC: C, = oct3, C = oct4, c = oct5
    if (octave === 3) return noteName + ',';
    if (octave === 4) return noteName;
    if (octave === 5) return noteName.replace(/^([_^]?)(.*)/, (_, acc, n) => acc + n.toLowerCase());
    if (octave === 6) return noteName.replace(/^([_^]?)(.*)/, (_, acc, n) => acc + n.toLowerCase()) + "'";
    return noteName;
  };

  // Convert note name to semitone
  const toSemi = n => NOTE_SEMITONE[n] !== undefined ? NOTE_SEMITONE[n] : -1;

  // Place notes in range C3-B4 following direction, no jumps > a 5th
  const placeNotes = (displayNotes, direction) => {
    if (!displayNotes || !displayNotes.length) return ['z'];
    const semis = displayNotes.map(toSemi).filter(s => s >= 0);
    if (!semis.length) return ['z'];

    const result = [];
    // Start in octave 3 for descending, octave 4 for ascending
    let oct = direction === 'down' ? 5 : 4;
    let prevSemi = semis[0];

    semis.forEach((semi, i) => {
      if (i === 0) {
        result.push(semitoneToABC(semi, oct));
        prevSemi = semi;
        return;
      }
      const diff = semi - prevSemi;
      if (direction === 'up') {
        if (diff < 0) oct++;
      } else {
        if (diff > 0) oct--;
      }
      // Clamp to range 5-6
      oct = Math.max(4, Math.min(5, oct));
      result.push(semitoneToABC(semi, oct));
      prevSemi = semi;
    });
    return result;
  };

  let abc = 'X:1\nT:Barry Harris\nM:4/4\nL:1/8\nK:C\n%%staffwidth 680\n%%scale 1.4\n%%gchordfont Helvetica 11\n%%annotationfont Helvetica 9\n';

  withDir.forEach((r, i) => {
    const chordName = (r.original || '').replace(/"/g, '').replace(/[^\w\s#b+\-]/g, '').trim();
    const scaleName = (r.scaleName || '').replace(/"/g, '').replace(/[^\w\s#b+\-→()]/g, '').trim();
    const dir = r.direction === 'up' ? '↑' : r.direction === 'down' ? '↓' : '';

    // Chord above, scale info below as annotation
    const chordLabel = chordName ? `"${chordName} ${dir}"` : '';
    const scaleLabel = scaleName ? `"_${scaleName}"` : '';

    if (!r.displayNotes || !r.displayNotes.length || r.scaleType === 'ref') {
      abc += `${chordLabel}${scaleLabel} z8 |`;
    } else {
      const notes = placeNotes(r.displayNotes, r.direction);
      const count = notes.length;
      const pad = count < 8 ? Array(8 - count).fill('z').join('') : '';
      abc += `${chordLabel}${scaleLabel} ${notes.join('')}${pad} |`;
    }

    if ((i + 1) % 4 === 0) abc += '\n';
  });

  return abc + '\n';
}

    overlay.appendChild(staffStyle);

    }
  };

  // Load ABCjs if not already loaded
  if (typeof ABCJS === 'undefined') {
    const script = document.createElement('script');

    script.onload = renderStaff;
    script.onerror = renderStaff; // show overlay even if ABCjs fails
    document.head.appendChild(script);
  } else {
    renderStaff();
  }
}

// ─── TRANSPOSE ────────────────────────────────────────────────────────────────

let transposeState = { semitones: 0, originalRaw: '' };

// Prefer flat notation for keys that conventionally use flats
const FLAT_KEYS = new Set(['F','Bb','Eb','Ab','Db','Gb']);

function preferFlat(idx) {
  // If NOTES_FLAT[idx] contains 'b', check if we should use it
  const flat = NOTES_FLAT[idx];
  const sharp = NOTES_SHARP[idx];
  // Always prefer flat for flat keys
  return flat;
}

function transposeChordString(raw, semitones) {
  if (semitones === 0) return raw;
  const match = raw.trim().match(/^([A-G][b#]?)(.*)/);
  if (!match) return raw;
  const rootRaw = match[1];
  const quality = match[2];
  const norm = ENHARMONICS[rootRaw] || rootRaw;
  const idx = NOTES_SHARP.indexOf(norm);
  if (idx === -1) return raw;
  const newIdx = ((idx + semitones) % 12 + 12) % 12;

  // Choose flat or sharp based on original notation + destination
  const originalWasFlat = rootRaw.includes('b');
  const sharp = NOTES_SHARP[newIdx];
  const flat = NOTES_FLAT[newIdx];
  // If note has no accidental in both arrays it's the same
  let newRoot;
  if (sharp === flat) {
    newRoot = sharp;
  } else if (originalWasFlat) {
    newRoot = flat;
  } else {
    // Default: use flat for conventionally flat notes, sharp otherwise
    newRoot = flat.includes('b') ? flat : sharp;
  }
  return newRoot + quality;
}

function transposeProgression(raw, semitones) {
  if (semitones === 0) return raw;
  // Split preserving separators
  return raw.replace(/([A-G][b#]?[^\s\/|]*)/g, m => transposeChordString(m, semitones));
}

function toggleTranspose() {
  const area = document.getElementById('transpose-area');
  const isVisible = area.classList.contains('visible');
  if (!isVisible) {
    transposeState.originalRaw = document.getElementById('input').value;
    transposeState.semitones = 0;
    document.getElementById('semitone-val').textContent = '0';
    document.getElementById('target-key').value = '';
    updateTransposePreview();
  }
  area.classList.toggle('visible');
}

function stepTranspose(delta) {
  transposeState.semitones = ((transposeState.semitones + delta + 12) % 24) - 12;
  // keep in -11..+11
  if (transposeState.semitones > 11) transposeState.semitones -= 12;
  if (transposeState.semitones < -11) transposeState.semitones += 12;
  document.getElementById('semitone-val').textContent =
    (transposeState.semitones > 0 ? '+' : '') + transposeState.semitones;
  document.getElementById('target-key').value = '';
  updateTransposePreview();
}

function setTargetKey(targetNote) {
  if (!targetNote) return;
  const raw = transposeState.originalRaw;
  // Find first chord root in original progression
  const match = raw.match(/([A-G][b#]?)/);
  if (!match) return;
  const firstRoot = match[1];
  const norm = ENHARMONICS[firstRoot] || firstRoot;
  const fromIdx = NOTES_SHARP.indexOf(norm);
  const toNorm = ENHARMONICS[targetNote] || targetNote;
  const toIdx = NOTES_SHARP.indexOf(toNorm);
  if (fromIdx === -1 || toIdx === -1) return;
  let semitones = (toIdx - fromIdx + 12) % 12;
  if (semitones > 6) semitones -= 12; // prefer shorter path
  transposeState.semitones = semitones;
  document.getElementById('semitone-val').textContent =
    (semitones > 0 ? '+' : '') + semitones;
  updateTransposePreview();
}

function updateTransposePreview() {
  const preview = document.getElementById('transpose-preview');
  const transposed = transposeProgression(transposeState.originalRaw, transposeState.semitones);
  if (transposeState.semitones === 0) {
    preview.innerHTML = '<span style="color:var(--dim)">sin cambio</span>';
  } else {
    preview.innerHTML = `→ <span class="prog">${transposed}</span>`;
  }
}

function applyTranspose() {
  const transposed = transposeProgression(transposeState.originalRaw, transposeState.semitones);
  document.getElementById('input').value = transposed;
  // Update originalRaw so further steps are relative to new value
  transposeState.originalRaw = transposed;
  transposeState.semitones = 0;
  document.getElementById('semitone-val').textContent = '0';
  document.getElementById('target-key').value = '';
  updateTransposePreview();
  document.getElementById('transpose-area').classList.remove('visible');
  document.getElementById('btn-transpose').style.display = '';
  analyze();
}
